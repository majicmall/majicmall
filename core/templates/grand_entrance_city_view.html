{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grand Entrance City View | MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

body {
  opacity:1;
  transition:opacity .9s ease;
}

.scene {
  position:fixed;
  inset:0;
}

.bg-fill {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(18px) brightness(.48);
  transform:scale(1.14);
}

.bg-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  animation:slowZoom 4.8s ease forwards;
}

@keyframes slowZoom {
  from { transform:scale(1); }
  to { transform:scale(1.045); }
}
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/grand_entrance_city_view.png' %}" class="bg-fill">
  <img src="{% static 'img/grand_entrance_city_view.png' %}" class="bg-main">
</div>

<script>
setTimeout(() => {
  document.body.style.opacity = ".95";

  setTimeout(() => {
    window.location.href = "{% url 'grand-reveal' %}";
  }, 600);

}, 4600);
</script>

</body>
</html>
