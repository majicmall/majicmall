{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grand Entrance City View | MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

body {
  opacity:1;
  transition:opacity .9s ease;
}

.scene {
  position:fixed;
  inset:0;
  overflow:hidden;
  background:#000;
}

.bg-fill,
.bg-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.bg-fill {
  filter:blur(18px) brightness(.48) saturate(1.2);
  transform:scale(1.14);
  z-index:1;
}

.bg-main {
  z-index:2;
  filter:brightness(.92) contrast(1.08) saturate(1.08);
  animation:cityPush 3.8s ease-in forwards;
}

.gold-wash {
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(255,215,120,.18), transparent 48%),
    linear-gradient(to bottom, rgba(0,0,0,.08), rgba(0,0,0,.28));
  mix-blend-mode:screen;
}

.fireworks {
  position:absolute;
  inset:0;
  z-index:4;
  pointer-events:none;
}

.fireworks span {
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#fff1a8;
  box-shadow:
    0 0 10px #fff1a8,
    18px 0 0 rgba(255,60,60,.9),
    -18px 0 0 rgba(255,215,90,.9),
    0 18px 0 rgba(255,255,255,.9),
    0 -18px 0 rgba(255,215,90,.9),
    13px 13px 0 rgba(255,60,60,.8),
    -13px -13px 0 rgba(255,255,255,.8);
  opacity:0;
  animation:fireworkPop 2.1s ease-in-out infinite;
}

.fireworks span:nth-child(1) { top:18%; left:18%; animation-delay:.2s; }
.fireworks span:nth-child(2) { top:24%; left:72%; animation-delay:.7s; }
.fireworks span:nth-child(3) { top:36%; left:50%; animation-delay:1.1s; }
.fireworks span:nth-child(4) { top:16%; left:46%; animation-delay:1.5s; }
.fireworks span:nth-child(5) { top:30%; left:28%; animation-delay:1.9s; }

.flash-lights {
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
  background:
    radial-gradient(circle at 25% 25%, rgba(255,255,255,.36), transparent 14%),
    radial-gradient(circle at 75% 30%, rgba(255,215,90,.32), transparent 16%),
    radial-gradient(circle at 50% 18%, rgba(255,60,60,.24), transparent 18%);
  opacity:0;
  animation:flashPulse 1.7s ease-in-out infinite;
  mix-blend-mode:screen;
}

@keyframes cityPush {
  from { transform:scale(1); }
  to { transform:scale(1.09); }
}

@keyframes fireworkPop {
  0% { opacity:0; transform:scale(.3); }
  18% { opacity:1; transform:scale(1.3); }
  42% { opacity:.65; transform:scale(2.3); }
  100% { opacity:0; transform:scale(3); }
}

@keyframes flashPulse {
  0%, 100% { opacity:0; }
  45% { opacity:.65; }
  55% { opacity:.18; }
}
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/grand_entrance_city_view.png' %}" class="bg-fill" alt="">
  <img src="{% static 'img/grand_entrance_city_view.png' %}" class="bg-main" alt="MajicMall Megaverse Grand Entrance City View">

  <div class="gold-wash"></div>

  <div class="fireworks">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="flash-lights"></div>
</div>

<script>
setTimeout(() => {
  document.body.style.opacity = ".90";

  setTimeout(() => {
    window.location.href = "{% url 'grand-reveal' %}";
  }, 450);

}, 3600);
</script>

</body>
</html>
