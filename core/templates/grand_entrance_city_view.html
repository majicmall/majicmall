{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grand Entrance City View | MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

body {
  opacity:1;
  transition:opacity .9s ease;
}

.scene {
  position:fixed;
  inset:0;
  overflow:hidden;
  background:#000;
}

.bg-fill,
.bg-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.bg-fill {
  filter:blur(18px) brightness(.48) saturate(1.2);
  transform:scale(1.14);
  z-index:1;
}

.bg-main {
  z-index:2;
  filter:brightness(.92) contrast(1.08) saturate(1.08);
  animation:cityPush 3.8s ease-in forwards;
}

.gold-wash {
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;

  background:
    radial-gradient(circle at center, rgba(255,215,120,.18), transparent 48%),
    linear-gradient(to bottom, rgba(0,0,0,.08), rgba(0,0,0,.28));

  mix-blend-mode:screen;
}

/* FIREWORKS */

.fireworks {
  position:absolute;
  inset:0;
  z-index:20;
  pointer-events:none;
}

.fireworks span {
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#fff7c2;

  box-shadow:
    0 0 18px #fff7c2,
    0 0 38px rgba(255,215,90,.95),
    34px 0 0 rgba(255,60,60,.95),
    -34px 0 0 rgba(255,215,90,.95),
    0 34px 0 rgba(255,255,255,.95),
    0 -34px 0 rgba(255,215,90,.95),
    24px 24px 0 rgba(255,60,60,.9),
    -24px -24px 0 rgba(255,255,255,.9),
    -24px 24px 0 rgba(255,215,90,.9),
    24px -24px 0 rgba(255,255,255,.9);

  opacity:0;

  animation:fireworkPop 1.7s ease-in-out infinite;
}

.fireworks span:nth-child(1) {
  top:18%;
  left:18%;
  animation-delay:0s;
}

.fireworks span:nth-child(2) {
  top:23%;
  left:76%;
  animation-delay:.35s;
}

.fireworks span:nth-child(3) {
  top:35%;
  left:50%;
  animation-delay:.7s;
}

.fireworks span:nth-child(4) {
  top:14%;
  left:46%;
  animation-delay:1s;
}

.fireworks span:nth-child(5) {
  top:31%;
  left:28%;
  animation-delay:1.25s;
}

/* FLASHING LIGHTS */

.flash-lights {
  position:absolute;
  inset:0;
  z-index:21;
  pointer-events:none;

  background:
    radial-gradient(circle at 25% 25%, rgba(255,255,255,.65), transparent 16%),
    radial-gradient(circle at 75% 30%, rgba(255,215,90,.55), transparent 18%),
    radial-gradient(circle at 50% 18%, rgba(255,60,60,.42), transparent 20%);

  opacity:0;

  animation:flashPulse 1.4s ease-in-out infinite;

  mix-blend-mode:screen;
}

/* ANIMATIONS */

@keyframes cityPush {
  from {
    transform:scale(1);
  }

  to {
    transform:scale(1.09);
  }
}

@keyframes fireworkPop {

  0% {
    opacity:0;
    transform:scale(.25);
  }

  12% {
    opacity:1;
    transform:scale(1.2);
  }

  38% {
    opacity:.9;
    transform:scale(2.9);
  }

  100% {
    opacity:0;
    transform:scale(4.2);
  }
}

@keyframes flashPulse {

  0%, 100% {
    opacity:0;
  }

  35% {
    opacity:.85;
  }

  48% {
    opacity:.2;
  }
}
</style>
</head>

<body>

<div class="scene">

  <img
    src="{% static 'img/grand_entrance_city_view.png' %}"
    class="bg-fill"
    alt=""
  >

  <img
    src="{% static 'img/grand_entrance_city_view.png' %}"
    class="bg-main"
    alt="MajicMall Megaverse Grand Entrance City View"
  >

  <div class="gold-wash"></div>

  <!-- FIREWORKS -->
  <div class="fireworks">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- FLASH LIGHTS -->
  <div class="flash-lights"></div>

</div>

<script>
setTimeout(() => {

  document.body.style.opacity = ".90";

  setTimeout(() => {

    window.location.href = "{% url 'grand-reveal' %}";

  }, 450);

}, 3600);
</script>

</body>
</html>
