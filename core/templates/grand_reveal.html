{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MajicMall Grand Reveal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body { opacity: 1; transition: opacity 1s ease; }

    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      animation: zoom 4s ease forwards;
    }

    @keyframes zoom {
      to { transform: scale(1.08); }
    }
  </style>
</head>

<body>

  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="bg">

  <script>
    setTimeout(() => {
      document.body.style.opacity = "0";
      setTimeout(() => {
        window.location.href = "/mall/";
      }, 1000);
    }, 4200);
  </script>

</body>
</html>
