{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse Grand Reveal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

body {
  opacity:0;
  animation:pageIn .5s ease forwards;
}

.scene {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
}

.entrance-fill,
.entrance-main,
.inside-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.entrance-fill {
  object-fit:cover;
  filter:blur(12px) brightness(.52) contrast(1.12) saturate(1.15);
  transform:scale(1.16);
  z-index:1;
}

.entrance-main {
  object-fit:cover;
  object-position:center center;
  z-index:2;
  filter:brightness(1.12) contrast(1.18) saturate(1.16);
  transform:scale(1.12);
  animation:continueWalk 6.9s cubic-bezier(.22,1,.36,1) forwards;
}

.inside-main {
  object-fit:cover;
  object-position:center center;
  z-index:4;
  opacity:0;
  transform:scale(1.16);
  filter:brightness(1.04) contrast(1.08) saturate(1.08);
  animation:insideReveal 4s cubic-bezier(.22,1,.36,1) 3.2s forwards;
}

.glow {
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(255,230,150,.26), transparent 42%),
    linear-gradient(to bottom, rgba(0,0,0,.02), rgba(0,0,0,.32));
  mix-blend-mode:screen;
  animation:glowPulse 6.9s ease-in-out forwards;
}

.portal-light {
  position:absolute;
  left:50%;
  top:50%;
  width:18vw;
  height:22vh;
  transform:translate(-50%, -50%);
  z-index:6;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,241,168,.44), rgba(212,175,55,.14), transparent 68%);
  filter:blur(12px);
  opacity:0;
  animation:portalPulse 5.3s ease-in-out .7s forwards;
  pointer-events:none;
}

.walk-shadow {
  position:absolute;
  inset:0;
  z-index:7;
  pointer-events:none;
  background:radial-gradient(circle at center, transparent 30%, rgba(0,0,0,.32) 100%);
  opacity:.35;
  animation:shadowEase 6.9s ease forwards;
}

.fade-out {
  position:absolute;
  inset:0;
  background:#000;
  z-index:10;
  opacity:0;
  pointer-events:none;
  animation:finalFade 8.1s ease-in-out forwards;
}

@keyframes pageIn {
  from { opacity:.9; }
  to { opacity:1; }
}

@keyframes continueWalk {
  0% { transform:scale(1.12); opacity:1; }
  45% { transform:scale(1.24); opacity:1; }
  72% { transform:scale(1.38); opacity:.65; }
  100% { transform:scale(1.52); opacity:0; }
}

@keyframes insideReveal {
  0% { opacity:0; transform:scale(1.16); }
  40% { opacity:.75; transform:scale(1.08); }
  100% { opacity:1; transform:scale(1); }
}

@keyframes glowPulse {
  0% { opacity:.55; }
  45% { opacity:1; }
  100% { opacity:.32; }
}

@keyframes portalPulse {
  0% { opacity:0; transform:translate(-50%, -50%) scale(.85); }
  35% { opacity:1; transform:translate(-50%, -50%) scale(1.55); }
  100% { opacity:0; transform:translate(-50%, -50%) scale(3.4); }
}

@keyframes shadowEase {
  0% { opacity:.28; }
  70% { opacity:.18; }
  100% { opacity:.4; }
}

@keyframes finalFade {
  0%, 91% { opacity:0; }
  100% { opacity:1; }
}
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="entrance-fill" alt="">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="entrance-main" alt="MajicMall Megaverse Grand Entrance">

  <img src="{% static 'img/inside_majic_mall.png' %}" class="inside-main" alt="Inside MajicMall Megaverse">

  <div class="glow"></div>
  <div class="portal-light"></div>
  <div class="walk-shadow"></div>
  <div class="fade-out"></div>
</div>

<script>
  setTimeout(() => {
    window.location.href = "{% url 'mall-directory' %}";
  }, 8200);
</script>

</body>
</html>
