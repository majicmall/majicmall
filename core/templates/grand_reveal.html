{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Grand Reveal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

body {
  opacity:0;
  animation:fadeIn .8s ease forwards;
  transition:opacity .8s ease;
}

.scene {
  position:fixed;
  inset:0;
}

.scene img {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes fadeIn {
  from { opacity:.8; }
  to { opacity:1; }
}

.zoom {
  animation:zoomIn 5s ease forwards;
}

@keyframes zoomIn {
  from { transform:scale(1); }
  to { transform:scale(1.08); }
}
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="zoom">
</div>

<script>
setTimeout(() => {
  document.body.style.opacity = ".9";

  setTimeout(() => {
    window.location.href = "{% url 'home' %}";
  }, 500);

}, 4500);
</script>

</body>
</html>
