{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Grand Reveal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

body {
  opacity:0;
  animation:fadeIn .85s ease forwards;
  transition:opacity .9s ease;
}

/* SCENE */
.scene {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
}

/* BACKGROUND FILL */
.bg-fill {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;

  filter:
    blur(14px)
    brightness(.48)
    contrast(1.08)
    saturate(1.15);

  transform:scale(1.12);

  z-index:1;
}

/* MAIN IMAGE */
.bg-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;

  z-index:2;

  filter:
    brightness(1.06)
    contrast(1.14)
    saturate(1.12);

  animation:grandPushIn 4.8s ease forwards;
}

/* GOLD ATMOSPHERE */
.glow {
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;

  background:
    radial-gradient(circle at center, rgba(255,215,120,.16), transparent 45%),
    linear-gradient(to bottom, rgba(0,0,0,.02), rgba(0,0,0,.18));
}

/* FADE IN */
@keyframes fadeIn {
  from {
    opacity:.78;
  }

  to {
    opacity:1;
  }
}

/* CONTINUED PUSH-IN */
@keyframes grandPushIn {

  from {
    transform:scale(1.04);
    opacity:.92;
  }

  to {
    transform:scale(1.18);
    opacity:1;
  }
}

.skip-directory {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 22px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 800;
  font-size: .95rem;
  letter-spacing: .03em;
  color: #111;
  background: linear-gradient(135deg,#fff3b0,#d4af37);
  border: 1px solid rgba(255,215,0,.65);
  box-shadow:
      0 0 18px rgba(255,215,0,.35),
      0 8px 25px rgba(0,0,0,.35);
  transition: .25s ease;
}

.skip-directory:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow:
      0 0 24px rgba(255,215,0,.6),
      0 12px 32px rgba(0,0,0,.45);
}

@media (max-width:768px) {
  .skip-directory {
    top:12px;
    right:12px;
    padding:10px 18px;
    font-size:.85rem;
  }
}

</style>
</head>

<body>

<a href="/directory/" class="skip-directory">
    ⏭ Skip To Directory
</a>


<div class="scene">

  <!-- SOFT ATMOSPHERIC FILL -->
  <img
    src="{% static 'img/majicmall_grand_entrance.png' %}"
    class="bg-fill"
    alt=""
  >

  <!-- MAIN ENTRANCE IMAGE -->
  <img
    src="{% static 'img/majicmall_grand_entrance.png' %}"
    class="bg-main"
    alt="MajicMall Grand Reveal"
  >

  <!-- GOLD GLOW -->
  <div class="glow"></div>

</div>

<script>
setTimeout(() => {

  document.body.style.opacity = ".90";

  setTimeout(() => {

    window.location.href = "{% url 'mall-home' %}";

  }, 450);

}, 4300);
</script>

</body>
</html>
