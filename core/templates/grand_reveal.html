{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MajicMall Grand Reveal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000 !important;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      opacity: 1;
      transition: opacity 1s ease;
    }

    .reveal-scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .reveal-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transform: scale(1.02);
      animation: slowZoom 4.2s ease forwards;
      z-index: 1;
    }

    .reveal-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at center, rgba(255, 215, 120, 0.15), transparent 48%),
        linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.35));
      pointer-events: none;
    }

    .caption {
      position: absolute;
      left: 50%;
      bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      z-index: 3;
      color: #f3d56a;
      background: rgba(0,0,0,0.62);
      border: 1px solid rgba(243,213,106,0.28);
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 900;
      text-align: center;
      max-width: calc(100vw - 24px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.55);
    }

    @keyframes slowZoom {
      from { transform: scale(1.02); }
      to { transform: scale(1.08); }
    }
  </style>
</head>

<body>

  <div class="reveal-scene">
    <img
      src="{% static 'img/majicmall_grand_entrance.png' %}"
      alt="MajicMall Grand Entrance"
      class="reveal-bg"
    >

    <div class="reveal-overlay"></div>

    <div class="caption">
      Welcome inside MajicMall Megaverse
    </div>
  </div>

  <script>
    setTimeout(function () {
      document.body.style.opacity = "0";

      setTimeout(function () {
        window.location.href = "{% url 'mall-home' %}";
      }, 1000);
    }, 4200);
  </script>

</body>
</html>
