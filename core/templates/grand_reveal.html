{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MajicMall Megaverse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    body {
      opacity: 1;
      transition: opacity 1s ease;
    }

    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="bg">

  <script>
    setTimeout(() => {
      document.body.style.opacity = "0";

      setTimeout(() => {
        window.location.href = "{% url 'mall-home' %}";
      }, 1000);

    }, 3200); // 👈 let it breathe
  </script>

</body>
</html>
