{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse Grand Reveal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

body {
  animation:softSceneIn .7s ease forwards;
}

@keyframes softSceneIn {
  from { opacity:.92; }
  to { opacity:1; }
}

.scene {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
}

.scene img {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
}

/* Soft luxury background depth */
.entrance-fill {
  z-index:1;
  filter:blur(7px) brightness(.62) contrast(1.08) saturate(1.1);
  transform:scale(1.14);
}

/* Main entrance image — sharper and grander */
.entrance-main {
  z-index:2;
  opacity:1;
  filter:brightness(1.08) contrast(1.16) saturate(1.12);
  transform:translate3d(0,-2%,0) scale(1.22);
  will-change:transform, opacity, filter;
  animation:cinematicWalk 8.8s cubic-bezier(.16,.84,.32,1) forwards;
}

/* Interior gently fuses in */
.inside-main {
  z-index:4;
  opacity:0;
  filter:brightness(.95) contrast(1.08) saturate(1.08);
  transform:translate3d(0,2%,0) scale(1.1);
  will-change:transform, opacity, filter;
  animation:insideMajicReveal 7s cubic-bezier(.16,.84,.32,1) 2.45s forwards;
}

/* Prestige gold wash */
.gold-atmosphere {
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 48%, rgba(255,232,150,.38), transparent 32%),
    radial-gradient(circle at 50% 78%, rgba(180,100,20,.22), transparent 42%),
    linear-gradient(to bottom, rgba(0,0,0,.08), rgba(0,0,0,.38));
  mix-blend-mode:screen;
  opacity:.65;
  animation:goldBreath 8.8s ease forwards;
}

/* Disney-style portal burst */
.portal-light {
  position:absolute;
  left:50%;
  top:50%;
  width:18vw;
  height:24vh;
  transform:translate(-50%, -50%) scale(.75);
  z-index:6;
  border-radius:50%;
  background:
    radial-gradient(circle, rgba(255,250,205,.92), rgba(255,215,100,.42), transparent 70%);
  filter:blur(12px);
  opacity:0;
  pointer-events:none;
  animation:royalPortal 6.6s ease .7s forwards;
}

/* Door opening illusion */
.door-left,
.door-right {
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:7;
  pointer-events:none;
  background:
    linear-gradient(to bottom, rgba(0,0,0,.86), rgba(30,18,4,.55), rgba(0,0,0,.9));
  box-shadow:inset 0 0 80px rgba(255,215,90,.12);
  animation:doorsOpen 5.8s cubic-bezier(.18,.82,.22,1) .8s forwards;
}

.door-left {
  left:0;
  transform-origin:left center;
}

.door-right {
  right:0;
  transform-origin:right center;
}

/* Gold seam between doors */
.door-seam {
  position:absolute;
  left:50%;
  top:0;
  width:4px;
  height:100%;
  z-index:8;
  transform:translateX(-50%);
  background:linear-gradient(to bottom, transparent, rgba(255,230,140,.9), transparent);
  box-shadow:0 0 28px rgba(255,220,120,.9);
  opacity:0;
  animation:seamGlow 5.8s ease .6s forwards;
}

/* Sparkle accents */
.sparkles {
  position:absolute;
  inset:0;
  z-index:9;
  pointer-events:none;
  background-image:
    radial-gradient(circle, rgba(255,255,220,.9) 0 1px, transparent 2px),
    radial-gradient(circle, rgba(255,210,100,.7) 0 1px, transparent 2px);
  background-size:120px 120px, 180px 180px;
  background-position:20% 30%, 70% 65%;
  opacity:0;
  animation:sparkleRise 7.8s ease 1.2s forwards;
}

/* Premium vignette */
.vignette {
  position:absolute;
  inset:0;
  z-index:10;
  pointer-events:none;
  background:
    radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.55) 100%);
  opacity:.45;
}

/* Optional title moment */
.reveal-title {
  position:absolute;
  left:50%;
  bottom:8vh;
  transform:translateX(-50%);
  z-index:11;
  color:#fff7d6;
  text-align:center;
  text-shadow:0 0 18px rgba(255,210,80,.75), 0 5px 20px #000;
  letter-spacing:.08em;
  font-weight:800;
  opacity:0;
  animation:titleReveal 6.2s ease 1.5s forwards;
}

.reveal-title .small {
  display:block;
  font-size:clamp(.8rem, 2.6vw, 1.1rem);
  color:#f6d879;
  margin-bottom:.35rem;
}

.reveal-title .big {
  display:block;
  font-size:clamp(1.5rem, 6vw, 3.6rem);
}

/* Final velvet fade */
.fade-out {
  position:absolute;
  inset:0;
  z-index:20;
  background:#000;
  opacity:0;
  pointer-events:none;
  animation:finalFade 9.6s ease forwards;
}

@keyframes cinematicWalk {
  0% {
    transform:translate3d(0,-2%,0) scale(1.22);
    opacity:1;
    filter:brightness(1.04) contrast(1.1) saturate(1.08);
  }
  45% {
    transform:translate3d(0,-3%,0) scale(1.38);
    opacity:.92;
    filter:brightness(1.12) contrast(1.18) saturate(1.12);
  }
  72% {
    transform:translate3d(0,-4%,0) scale(1.56);
    opacity:.62;
  }
  100% {
    transform:translate3d(0,-5%,0) scale(1.74);
    opacity:0;
  }
}

@keyframes insideMajicReveal {
  0% {
    opacity:0;
    transform:translate3d(0,2%,0) scale(1.1);
    filter:brightness(.88) blur(1.5px);
  }
  35% {
    opacity:.55;
    transform:translate3d(0,1%,0) scale(1.055);
    filter:brightness(1.04) blur(.5px);
  }
  70% {
    opacity:.95;
  }
  100% {
    opacity:1;
    transform:translate3d(0,0,0) scale(1);
    filter:brightness(1.08) blur(0);
  }
}

@keyframes doorsOpen {
  0% {
    transform:scaleX(1);
    opacity:.96;
  }
  45% {
    opacity:.8;
  }
  100% {
    transform:scaleX(.02);
    opacity:0;
  }
}

@keyframes seamGlow {
  0% { opacity:0; transform:translateX(-50%) scaleY(.2); }
  35% { opacity:1; transform:translateX(-50%) scaleY(1); }
  100% { opacity:0; transform:translateX(-50%) scaleY(1.2); }
}

@keyframes royalPortal {
  0% {
    opacity:0;
    transform:translate(-50%, -50%) scale(.75);
  }
  35% {
    opacity:.95;
    transform:translate(-50%, -50%) scale(1.45);
  }
  70% {
    opacity:.55;
    transform:translate(-50%, -50%) scale(2.5);
  }
  100% {
    opacity:0;
    transform:translate(-50%, -50%) scale(3.6);
  }
}

@keyframes goldBreath {
  0% { opacity:.35; }
  45% { opacity:.9; }
  100% { opacity:.36; }
}

@keyframes sparkleRise {
  0% {
    opacity:0;
    transform:translateY(20px) scale(1);
  }
  35% {
    opacity:.65;
  }
  100% {
    opacity:0;
    transform:translateY(-80px) scale(1.08);
  }
}

@keyframes titleReveal {
  0%, 12% {
    opacity:0;
    transform:translateX(-50%) translateY(18px);
  }
  35%, 72% {
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  100% {
    opacity:0;
    transform:translateX(-50%) translateY(-10px);
  }
}

@keyframes finalFade {
  0%, 92% { opacity:0; }
  100% { opacity:1; }
}
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="entrance-fill" alt="">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="entrance-main" alt="MajicMall Megaverse Grand Entrance">

  <img src="{% static 'img/inside_majic_mall.png' %}" class="inside-main" alt="Inside MajicMall Megaverse">

  <div class="gold-atmosphere"></div>
  <div class="portal-light"></div>

  <div class="door-left"></div>
  <div class="door-right"></div>
  <div class="door-seam"></div>

  <div class="sparkles"></div>
  <div class="vignette"></div>

  <div class="reveal-title">
    <span class="small">WELCOME TO</span>
    <span class="big">MajicMall Megaverse</span>
  </div>

  <div class="fade-out"></div>
</div>

<script>
  setTimeout(() => {
    window.location.href = "{% url 'mall-directory' %}";
  }, 9600);
</script>

</body>
</html>
