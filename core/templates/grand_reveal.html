{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse Grand Reveal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

body {
  opacity:1;
}

.scene {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
}

.entrance-fill,
.entrance-main,
.inside-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.entrance-fill {
  object-fit:cover;
  object-position:center center;
  filter:blur(12px) brightness(.5) contrast(1.12) saturate(1.12);
  transform:translate3d(0,0,0) scale(1.18);
  z-index:1;
}

.entrance-main {
  object-fit:cover;
  object-position:center center;
  z-index:2;
  filter:brightness(1.1) contrast(1.14) saturate(1.1);
  transform:translate3d(0,-2.2%,0) scale(1.28);
  will-change:transform, opacity;
  backface-visibility:hidden;
  animation:continueWalk 7.6s linear forwards;
}

.inside-main {
  object-fit:cover;
  object-position:center center;
  z-index:4;
  opacity:0;
  transform:translate3d(0,1.5%,0) scale(1.12);
  filter:brightness(1.04) contrast(1.06) saturate(1.06);
  will-change:transform, opacity;
  backface-visibility:hidden;
  animation:insideReveal 5.4s linear 2.7s forwards;
}

.glow {
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(255,230,150,.24), transparent 43%),
    linear-gradient(to bottom, rgba(0,0,0,.02), rgba(0,0,0,.3));
  mix-blend-mode:screen;
  animation:glowPulse 7.6s linear forwards;
}

.portal-light {
  position:absolute;
  left:50%;
  top:50%;
  width:20vw;
  height:24vh;
  transform:translate(-50%, -50%);
  z-index:6;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,241,168,.36), rgba(212,175,55,.12), transparent 68%);
  filter:blur(14px);
  opacity:0;
  animation:portalPulse 5.8s linear .25s forwards;
  pointer-events:none;
}

.walk-shadow {
  position:absolute;
  inset:0;
  z-index:7;
  pointer-events:none;
  background:radial-gradient(circle at center, transparent 32%, rgba(0,0,0,.34) 100%);
  opacity:.28;
}

.fade-out {
  position:absolute;
  inset:0;
  background:#000;
  z-index:10;
  opacity:0;
  pointer-events:none;
  animation:finalFade 8.4s linear forwards;
}

@keyframes continueWalk {
  0% {
    transform:translate3d(0,-2.2%,0) scale(1.28);
    opacity:.95;
  }
  45% {
    transform:translate3d(0,-3%,0) scale(1.42);
    opacity:.82;
  }
  72% {
    transform:translate3d(0,-3.8%,0) scale(1.58);
    opacity:.48;
  }
  100% {
    transform:translate3d(0,-4.4%,0) scale(1.72);
    opacity:0;
  }
}

@keyframes insideReveal {
  0% {
    opacity:0;
    transform:translate3d(0,1.5%,0) scale(1.12);
  }
  45% {
    opacity:.86;
    transform:translate3d(0,.5%,0) scale(1.045);
  }
  100% {
    opacity:1;
    transform:translate3d(0,0,0) scale(1);
  }
}

@keyframes glowPulse {
  0% { opacity:.72; }
  55% { opacity:.9; }
  100% { opacity:.28; }
}

@keyframes portalPulse {
  0% {
    opacity:0;
    transform:translate(-50%, -50%) scale(.85);
  }
  38% {
    opacity:.88;
    transform:translate(-50%, -50%) scale(1.55);
  }
  100% {
    opacity:0;
    transform:translate(-50%, -50%) scale(3.15);
  }
}

@keyframes finalFade {
  0%, 93% { opacity:0; }
  100% { opacity:1; }
}
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="entrance-fill" alt="">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="entrance-main" alt="MajicMall Megaverse Grand Entrance">

  <img src="{% static 'img/inside_majic_mall.png' %}" class="inside-main" alt="Inside MajicMall Megaverse">

  <div class="glow"></div>
  <div class="portal-light"></div>
  <div class="walk-shadow"></div>
  <div class="fade-out"></div>
</div>

<script>
  setTimeout(() => {
    window.location.href = "{% url 'mall-directory' %}";
  }, 8400);
</script>

</body>
</html>
