{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse Grand Reveal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

.scene {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

.scene img {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Cinematic entrance */
.entrance-main {
  animation:zoomIn 8s ease forwards;
}

@keyframes zoomIn {
  from { transform:scale(1.1); }
  to   { transform:scale(1.6); }
}
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="entrance-main">
</div>

<script>
  setTimeout(() => {
    window.location.href = "{% url 'mall-directory' %}";
  }, 8000);
</script>

</body>
</html>
