{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MajicMall Megaverse Grand Reveal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .bg-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(18px) brightness(0.50) saturate(1.25);
      transform: scale(1.12);
      z-index: 1;
    }

    .bg-main {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 2;
      filter: brightness(1.04) contrast(1.10) saturate(1.10);
      animation: slowZoom 4.6s ease forwards;
      image-rendering: -webkit-optimize-contrast;
    }

    .glow {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255,215,120,0.16), transparent 45%),
        linear-gradient(to bottom, rgba(0,0,0,0.03), rgba(0,0,0,0.20));
    }

    @keyframes slowZoom {
      from { transform: scale(1); }
      to { transform: scale(1.045); }
    }
  </style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/grand_reveal_entrance.png' %}" class="bg-fill" alt="">
  <img src="{% static 'img/grand_reveal_entrance.png' %}" class="bg-main" alt="MajicMall Megaverse Grand Reveal Entrance">

  <div class="glow"></div>
</div>

<script>
  setTimeout(() => {
    window.location.href = "{% url 'mall-home' %}";
  }, 4300);
</script>

</body>
</html>
