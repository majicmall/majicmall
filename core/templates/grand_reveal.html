{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:#000;
}

.bg {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain; /* 👈 full image visible */
  animation:zoom 4s ease forwards;
}

@keyframes zoom {
  to { transform:scale(1.06); }
}
</style>
</head>

<body>

<img src="{% static 'img/majicmall_grand_entrance.png' %}" class="bg">

<script>
setTimeout(()=>{
  window.location.href="/mall/";
},4200);
</script>

</body>
</html>
