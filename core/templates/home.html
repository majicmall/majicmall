{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
}

body {
  opacity:1;
  transition:opacity .9s ease;
}

.scene {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
}

.bg-fill {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 68%;
  filter:blur(12px) brightness(.48) contrast(1.12) saturate(1.2);
  transform:scale(1.06);
  z-index:1;
}

.bg-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 72%;
  z-index:2;
  filter:brightness(1.06) contrast(1.16) saturate(1.12);
  transform:scale(.94);
  transition:transform 1s ease, filter 1s ease;
}

@media (min-width:768px) {
  .bg-main {
    object-fit:contain;
    object-position:center center;
    transform:scale(1);
  }
}

.luxury-glow {
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(255,215,120,.12), transparent 45%),
    linear-gradient(to bottom, rgba(0,0,0,.04), rgba(0,0,0,.18));
}

.door {
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:7;
  overflow:hidden;
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  background:rgba(255,255,255,.06);
  border:2px solid rgba(212,175,55,.42);
  box-shadow:inset 0 0 45px rgba(255,255,255,.08);
}

.door.left {
  left:0;
  animation:openLeft 2.7s ease-in-out 1.2s forwards;
}

.door.right {
  right:0;
  animation:openRight 2.7s ease-in-out 1.2s forwards;
}

.handle {
  position:absolute;
  top:50%;
  width:11px;
  height:98px;
  transform:translateY(-50%);
  border-radius:999px;
  background:linear-gradient(to bottom,#fff5bd,#d4af37,#fff1a8);
  box-shadow:0 0 18px rgba(243,213,106,.72);
}

.door.left .handle { right:24px; }
.door.right .handle { left:24px; }

@keyframes openLeft { to { transform:translateX(-105%); } }
@keyframes openRight { to { transform:translateX(105%); } }
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/grand_entrance_city_view.png' %}" class="bg-fill" alt="">
  <img src="{% static 'img/grand_entrance_city_view.png' %}" class="bg-main" alt="MajicMall Megaverse Grand Entrance City View">

  <div class="luxury-glow"></div>

  <div class="door left"><div class="handle"></div></div>
  <div class="door right"><div class="handle"></div></div>
</div>

<script>
setTimeout(() => {
  const mainImage = document.querySelector(".bg-main");

  if (mainImage) {
    mainImage.style.transform = window.innerWidth < 768 ? "scale(.98)" : "scale(1.02)";
    mainImage.style.filter = "brightness(1.08) contrast(1.18) saturate(1.15)";
  }

  setTimeout(() => {
    document.body.style.opacity = ".92";

    setTimeout(() => {
      window.location.href = "{% url 'grand-reveal' %}";
    }, 450);
  }, 700);

}, 5800);
</script>

</body>

<script>
setTimeout(() => {
  window.location.href = "{% url 'mall-directory' %}";
}, 7000);
</script>
</html>
