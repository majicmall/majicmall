{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Entering Majic Mall...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: black;
      overflow: hidden;
    }

    /* Fade out animation */
    .fade-out {
      animation: fadeOut 1.5s ease forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Text entrance */
    .fade-in {
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body id="entrance">

  <!-- Background doors image -->
  <img 
    src="{% static 'img/majicmall_front_view.png' %}" 
    alt="" 
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;"
  >

  <!-- Welcome overlay -->
 <div class="absolute inset-0 flex items-end justify-center pb-12 fade-in">
  <p class="text-yellow-300 text-sm tracking-widest uppercase opacity-80">
    Entering...
  </p>
</div>

  <script>
    // Wait a moment → fade out → redirect to mall
    setTimeout(() => {
      document.getElementById("entrance").classList.add("fade-out");
    }, 2500);

    setTimeout(() => {
      window.location.href = "/mall/";
    }, 4000);
  </script>

</body>
</html>
