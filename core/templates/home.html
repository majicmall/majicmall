{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enter MajicMall Megaverse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      opacity: 1;
      transition: opacity 1s ease;
    }

    /* ✅ FIXED MOBILE HEIGHT */
    .scene {
      position: relative;
      width: 100%;
      height: 100dvh;
      background:
        radial-gradient(circle at top center, rgba(255, 215, 0, 0.12), transparent 28%),
        linear-gradient(to bottom, #030303 0%, #0a0a0a 45%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ✅ FULLSCREEN ON MOBILE */
    .entrance-frame {
      position: relative;
      width: 100vw;
      height: 100dvh;
      border-radius: 0;
      overflow: hidden;
      background: #040404;
    }

    /* ✅ DESKTOP FRAME RESTORED */
    @media (min-width: 768px) {
      .entrance-frame {
        width: min(94vw, 1300px);
        height: min(88vh, 780px);
        border-radius: 28px;
        box-shadow:
          0 0 0 2px rgba(212, 175, 55, 0.28),
          0 24px 60px rgba(0, 0, 0, 0.65),
          0 0 40px rgba(212, 175, 55, 0.10);
      }
    }

    .interior-view {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.08), transparent 18%),
        linear-gradient(to top, rgba(0,0,0,0.32), transparent 22%),
        url("{% static 'img/inside_majic_mall.png' %}") center center / cover no-repeat;
      filter: brightness(0.78) saturate(1.02);
      transform: scale(1.03);
      z-index: 0;
    }

    .interior-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255, 214, 102, 0.56), rgba(255, 214, 102, 0.14) 34%, transparent 62%);
      opacity: 0.72;
      z-index: 1;
      animation: interiorPulse 4s ease-in-out infinite;
    }

    .burst-flash {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255, 239, 170, 0.95), transparent 60%);
      opacity: 0;
      animation: burstFlash 1.25s ease-out 0.2s forwards;
      mix-blend-mode: screen;
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .particles span {
      position: absolute;
      width: 6px;
      height: 6px;
      background: gold;
      border-radius: 999px;
      animation: floatParticle 2.5s ease-out forwards;
    }

    .door {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: #111;
      z-index: 4;
    }

    .door.left {
      left: 0;
      animation: openLeftDoor 2.6s ease-in-out 1.2s forwards;
    }

    .door.right {
      right: 0;
      animation: openRightDoor 2.6s ease-in-out 1.2s forwards;
    }

    .center-seam-glow {
      position: absolute;
      left: 50%;
      width: 10px;
      height: 100%;
      transform: translateX(-50%);
      background: gold;
      z-index: 6;
      animation: seamFlash 1s ease-out forwards;
    }

    .headline-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 7;
    }

    .title {
      font-size: clamp(2.2rem, 6vw, 5rem);
      font-weight: 900;
      color: white;
      text-align: center;
    }

    .status-line {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      color: gold;
      font-weight: bold;
      z-index: 8;
    }

    @keyframes openLeftDoor {
      to { transform: translateX(-100%); }
    }

    @keyframes openRightDoor {
      to { transform: translateX(100%); }
    }

    @keyframes burstFlash {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes seamFlash {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes floatParticle {
      to {
        transform: translateY(-120px);
        opacity: 0;
      }
    }

    @keyframes interiorPulse {
      50% { opacity: 1; }
    }
  </style>
</head>

<body>

  <div class="scene">
    <div class="entrance-frame">

      <div class="interior-view"></div>
      <div class="interior-glow"></div>
      <div class="burst-flash"></div>
      <div class="particles"></div>

      <div class="door left"></div>
      <div class="door right"></div>
      <div class="center-seam-glow"></div>

      <div class="headline-wrap">
        <h1 class="title">MajicMall<br>Megaverse</h1>
      </div>

      <div class="status-line">
        Opening the doors...
      </div>

    </div>
  </div>

  <script>
    const nextUrl = "{% url 'mall-home' %}";

    function spawnParticles() {
      const container = document.querySelector(".particles");
      for (let i = 0; i < 14; i++) {
        const p = document.createElement("span");
        p.style.left = (48 + Math.random() * 4) + "%";
        p.style.top = "55%";
        container.appendChild(p);
        setTimeout(() => p.remove(), 2500);
      }
    }

    setTimeout(spawnParticles, 1200);

    setTimeout(() => {
      document.body.style.opacity = "0";
      setTimeout(() => {
        window.location.href = nextUrl;
      }, 1000);
    }, 5200);
  </script>

</body>
</html>
