{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Entering Majic Mall...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: black;
      overflow: hidden;
    }

    /* Fade out animation */
    .fade-out {
      animation: fadeOut 1.5s ease forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Text entrance */
    .fade-in {
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body id="entrance">

  <!-- Background doors image -->
  <img 
    src="{% static 'img/majicmall_front_view.png' %}" 
    alt="" 
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;"
  >

  <!-- Welcome overlay -->
  <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4 fade-in">
    <h1 class="text-white text-4xl md:text-6xl font-bold mb-4 drop-shadow-lg">
      Welcome To Majic Mall
    </h1>
    <p class="text-yellow-300 text-lg md:text-2xl mt-2">
      Preparing Your Experience...
    </p>
  </div>

  <script>
    // Wait a moment → fade out → redirect to mall
    setTimeout(() => {
      document.getElementById("entrance").classList.add("fade-out");
    }, 2500);

    setTimeout(() => {
      window.location.href = "/mall/";
    }, 4000);
  </script>

</body>
</html>
