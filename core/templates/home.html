{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

body { opacity:1; transition:opacity .8s ease; }

.scene {
  position:fixed;
  inset:0;
}

/* FULL IMAGE (NO CROPPING) */
.bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain; /* 👈 shows full image */
  background:#000;
}

/* DOORS */
.door {
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  backdrop-filter:blur(3px);
  background:rgba(255,255,255,0.05);
  border:2px solid rgba(212,175,55,.4);
  z-index:2;
}

.door.left { left:0; animation:openLeft 2.6s ease 1.2s forwards; }
.door.right { right:0; animation:openRight 2.6s ease 1.2s forwards; }

@keyframes openLeft { to { transform:translateX(-105%); } }
@keyframes openRight { to { transform:translateX(105%); } }

/* HANDLE */
.handle {
  position:absolute;
  top:50%;
  width:10px;
  height:90px;
  transform:translateY(-50%);
  border-radius:999px;
  background:linear-gradient(to bottom,#fff1a8,#c9a227,#fff1a8);
  box-shadow:0 0 14px rgba(243,213,106,.7);
}

.left .handle { right:20px; }
.right .handle { left:20px; }

/* LIGHT SWEEP */
.handle::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,transparent,white,transparent);
  opacity:0;
  animation:sweep 1.5s ease 1.3s forwards;
}

@keyframes sweep {
  0% {opacity:0; transform:translateY(-40px);}
  40% {opacity:1;}
  100% {opacity:0; transform:translateY(60px);}
}

/* REFLECTION */
.reflection {
  position:absolute;
  top:-20%;
  width:40%;
  height:140%;
  background:linear-gradient(to bottom,rgba(255,255,255,.3),transparent);
  transform:skewX(-15deg);
  opacity:0;
  animation:reflect 2s ease 1.2s forwards;
}

.left .reflection { right:12%; }
.right .reflection { left:12%; transform:skewX(15deg); }

@keyframes reflect {
  0% {opacity:0; transform:translateX(-60px);}
  30% {opacity:.6;}
  100% {opacity:0; transform:translateX(120px);}
}

</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="bg">

  <div class="door left">
    <div class="reflection"></div>
    <div class="handle"></div>
  </div>

  <div class="door right">
    <div class="reflection"></div>
    <div class="handle"></div>
  </div>
</div>

<script>
setTimeout(()=>{
  document.body.style.opacity="0.95"; // 👈 NO BLACK FLASH
  setTimeout(()=>{
    window.location.href="/grand-reveal/";
  },600);
},4800);
</script>

</body>
</html>
