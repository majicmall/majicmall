{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enter MajicMall Megaverse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body { opacity: 1; transition: opacity 0.8s ease; }

    .scene { position: fixed; inset: 0; background: #000; }

    /* Dark backdrop only (no duplicate image) */
    .backdrop {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255, 224, 140, 0.10), transparent 50%),
        linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
      z-index: 1;
    }

    .door {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      z-index: 3;
      backdrop-filter: blur(3px);
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(212,175,55,0.35);
    }

    .door.left {
      left: 0;
      animation: openLeft 2.4s ease-in-out 1s forwards;
    }

    .door.right {
      right: 0;
      animation: openRight 2.4s ease-in-out 1s forwards;
    }

    @keyframes openLeft {
      to { transform: translateX(-105%); }
    }

    @keyframes openRight {
      to { transform: translateX(105%); }
    }

    .headline {
      position: absolute;
      top: 14%;
      width: 100%;
      text-align: center;
      z-index: 5;
      color: white;
    }

    .headline h1 {
      font-size: clamp(2.2rem, 9vw, 4rem);
      font-weight: 900;
      text-shadow: 0 0 20px rgba(255,215,0,0.2);
    }

    .headline p {
      color: #f3d56a;
      margin-top: 10px;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <div class="scene">
    <div class="backdrop"></div>

    <div class="door left"></div>
    <div class="door right"></div>

    <div class="headline">
      <h1>MajicMall<br>Megaverse</h1>
      <p>Opening the doors...</p>
    </div>
  </div>

  <script>
    setTimeout(() => {
      document.body.style.opacity = "0";
      setTimeout(() => {
        window.location.href = "/grand-reveal/";
      }, 800);
    }, 3800);
  </script>

</body>
</html>
