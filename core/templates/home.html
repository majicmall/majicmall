{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enter MajicMall Megaverse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* GRAND VIEW BEHIND DOORS */
    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.03);
      filter: brightness(0.92) contrast(1.06);
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at center, rgba(255,215,120,0.10), transparent 45%),
        linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.30));
    }

    /* DOORS */
    .door {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      z-index: 4;
      backdrop-filter: blur(3px);
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(212,175,55,0.35);
      overflow: hidden;
    }

    .door.left {
      left: 0;
      animation: openLeft 2.6s ease-in-out 1.2s forwards;
    }

    .door.right {
      right: 0;
      animation: openRight 2.6s ease-in-out 1.2s forwards;
    }

    @keyframes openLeft {
      to { transform: translateX(-105%); }
    }

    @keyframes openRight {
      to { transform: translateX(105%); }
    }

    /* GLASS REFLECTION SWEEP */
    .reflection {
      position: absolute;
      top: -20%;
      width: 40%;
      height: 140%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.35),
        rgba(255,255,255,0.08),
        transparent
      );
      transform: skewX(-15deg);
      opacity: 0;
      animation: reflectMove 2.2s ease forwards;
      pointer-events: none;
    }

    .door.left .reflection {
      right: 12%;
      animation-delay: 1.2s;
    }

    .door.right .reflection {
      left: 12%;
      transform: skewX(15deg);
      animation-delay: 1.2s;
    }

    @keyframes reflectMove {
      0% {
        opacity: 0;
        transform: translateX(-60px) skewX(-15deg);
      }
      30% {
        opacity: 0.6;
      }
      100% {
        opacity: 0;
        transform: translateX(120px) skewX(-15deg);
      }
    }

    /* GOLD HANDLES */
    .handle {
      position: absolute;
      top: 50%;
      width: 10px;
      height: 95px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: linear-gradient(to bottom, #fff1a8, #c9a227, #fff1a8);
      box-shadow:
        0 0 16px rgba(243,213,106,0.65),
        inset 0 0 2px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .door.left .handle { right: 22px; }
    .door.right .handle { left: 22px; }

    /* HANDLE LIGHT SWEEP */
    .handle::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(255,255,255,0.9),
        transparent
      );
      opacity: 0;
      animation: handleGlow 1.6s ease forwards;
      animation-delay: 1.3s;
    }

    @keyframes handleGlow {
      0% { opacity: 0; transform: translateY(-40px); }
      40% { opacity: 1; }
      100% { opacity: 0; transform: translateY(60px); }
    }

    /* PARTICLES */
    .particles span {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: gold;
      box-shadow: 0 0 10px gold;
      animation: float 2s ease-out forwards;
    }

    @keyframes float {
      to {
        transform: translateY(-120px);
        opacity: 0;
      }
    }

  </style>
</head>

<body>

<div class="scene">

  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="bg">

  <div class="overlay"></div>

  <!-- DOORS -->
  <div class="door left">
    <div class="reflection"></div>
    <div class="handle"></div>
  </div>

  <div class="door right">
    <div class="reflection"></div>
    <div class="handle"></div>
  </div>

</div>

<script>
  function particles() {
    for (let i = 0; i < 15; i++) {
      let p = document.createElement("span");
      p.style.left = (48 + Math.random()*4) + "%";
      p.style.top = "60%";
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),2000);
    }
  }

  setTimeout(particles, 1200);

  setTimeout(() => {
    document.body.style.opacity = "0";
    setTimeout(() => {
      window.location.href = "/grand-reveal/";
    }, 800);
  }, 4800);
</script>

</body>
</html>
