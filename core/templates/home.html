{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enter MajicMall Megaverse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      opacity: 1;
      transition: opacity 1s ease;
    }

    .scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .entrance-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 1;
      transform: scale(1.03);
      filter: brightness(0.82) saturate(1.08);
    }

    .luxury-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255, 224, 140, 0.18), transparent 42%),
        linear-gradient(to bottom, rgba(0,0,0,0.06), rgba(0,0,0,0.24));
    }

    .spotlight {
      position: absolute;
      top: -20%;
      width: 44vw;
      height: 145%;
      z-index: 3;
      pointer-events: none;
      filter: blur(18px);
      opacity: 0.72;
      mix-blend-mode: screen;
      transform-origin: top center;
    }

    .spotlight.gold-left {
      left: -18vw;
      background: linear-gradient(
        160deg,
        rgba(255, 215, 80, 0.72) 0%,
        rgba(212, 175, 55, 0.40) 24%,
        rgba(212, 175, 55, 0.12) 52%,
        transparent 76%
      );
      animation: sweepLeft 5.8s ease-in-out infinite alternate;
    }

    .spotlight.red-right {
      right: -18vw;
      background: linear-gradient(
        200deg,
        rgba(255, 70, 70, 0.58) 0%,
        rgba(220, 38, 38, 0.34) 24%,
        rgba(220, 38, 38, 0.10) 52%,
        transparent 76%
      );
      animation: sweepRight 6.4s ease-in-out infinite alternate;
    }

    .spotlight.gold-center {
      left: 35vw;
      top: -28%;
      width: 32vw;
      opacity: 0.42;
      background: linear-gradient(
        180deg,
        rgba(255, 237, 160, 0.65) 0%,
        rgba(212, 175, 55, 0.22) 38%,
        transparent 72%
      );
      animation: centerGlowMove 7s ease-in-out infinite alternate;
    }

    .burst-flash {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255,245,200,0.90) 0%, rgba(255,215,120,0.42) 16%, rgba(255,215,0,0.12) 34%, transparent 58%);
      opacity: 0;
      mix-blend-mode: screen;
      animation: burstFlash 1.1s ease-out 0.2s forwards;
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 8;
      overflow: hidden;
      pointer-events: none;
    }

    .particles span {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 215, 0, 0.92);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.70);
      animation: floatParticle 2.4s ease-out forwards;
    }

    .center-seam-glow {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 12px;
      transform: translateX(-50%);
      z-index: 9;
      background: linear-gradient(to bottom, transparent, rgba(255,240,180,0.96), transparent);
      box-shadow:
        0 0 20px rgba(255, 223, 128, 0.75),
        0 0 56px rgba(255, 223, 128, 0.40);
      animation: seamGlow 1.4s ease-in-out 0s 2, seamFlash 0.8s ease-out 0.2s forwards;
      pointer-events: none;
    }

    .door {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      z-index: 7;
      overflow: hidden;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.16), rgba(255,255,255,0.05) 20%, rgba(255,255,255,0.025) 45%, rgba(0,0,0,0.08) 100%),
        linear-gradient(to right, rgba(255,255,255,0.13), rgba(255,255,255,0.025));
      border-top: 2px solid rgba(212, 175, 55, 0.34);
      border-bottom: 2px solid rgba(212, 175, 55, 0.34);
      box-shadow:
        inset 0 0 0 2px rgba(212, 175, 55, 0.22),
        inset 0 0 42px rgba(255,255,255,0.08);
    }

    .door.left {
      left: 0;
      border-left: 2px solid rgba(212, 175, 55, 0.38);
      border-right: 1px solid rgba(212, 175, 55, 0.28);
      animation: openLeftDoor 2.6s ease-in-out 1.2s forwards;
    }

    .door.right {
      right: 0;
      border-right: 2px solid rgba(212, 175, 55, 0.38);
      border-left: 1px solid rgba(212, 175, 55, 0.28);
      animation: openRightDoor 2.6s ease-in-out 1.2s forwards;
    }

    .door::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 2px solid rgba(212, 175, 55, 0.30);
      pointer-events: none;
    }

    .door::after {
      content: "";
      position: absolute;
      top: 15%;
      bottom: 15%;
      width: 2px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.78), transparent);
      opacity: 0.72;
      pointer-events: none;
    }

    .door.left::after {
      right: 22%;
    }

    .door.right::after {
      left: 22%;
    }

    .door-reflection {
      position: absolute;
      top: -10%;
      width: 38%;
      height: 130%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.26),
        rgba(255,255,255,0.08) 24%,
        rgba(255,255,255,0.00) 54%
      );
      transform: skewX(-14deg);
      filter: blur(1px);
      pointer-events: none;
    }

    .door.left .door-reflection {
      right: 10%;
    }

    .door.right .door-reflection {
      left: 10%;
      transform: skewX(14deg);
    }

    .door-handle {
      position: absolute;
      top: 50%;
      width: 10px;
      height: 90px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: linear-gradient(to bottom, #fff1a8, #c9a227, #fff1a8);
      box-shadow:
        0 0 14px rgba(243, 213, 106, 0.55),
        inset 0 0 2px rgba(0,0,0,0.25);
    }

    .door.left .door-handle {
      right: 24px;
    }

    .door.right .door-handle {
      left: 24px;
    }

    .headline-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 14vh;
      padding-left: 16px;
      padding-right: 16px;
      z-index: 10;
      pointer-events: none;
    }

    .headline-panel {
      width: 100%;
      max-width: 540px;
      text-align: center;
      padding: 20px 16px 16px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(243, 213, 106, 0.20);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.65),
        0 0 40px rgba(212, 175, 55, 0.10);
      animation: fadeUp 1.15s ease 0.2s both;
    }

    .eyebrow {
      color: #f3d56a;
      font-size: clamp(0.8rem, 3vw, 1.05rem);
      font-weight: 800;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .title {
      margin: 0;
      color: #fff;
      font-size: clamp(2.4rem, 11vw, 3.4rem);
      line-height: 0.95;
      font-weight: 900;
      text-shadow:
        0 0 20px rgba(255, 215, 0, 0.16),
        0 6px 24px rgba(0, 0, 0, 0.60);
    }

    .subtitle {
      margin: 14px auto 0;
      max-width: 430px;
      color: #f5f5f5;
      font-size: clamp(0.95rem, 4vw, 1.15rem);
      font-weight: 650;
      line-height: 1.45;
    }

    .status-line {
      position: absolute;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      z-index: 11;
      max-width: calc(100vw - 24px);
      text-align: center;
      color: #f3d56a;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      background: rgba(0, 0, 0, 0.62);
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(243, 213, 106, 0.28);
      box-shadow: 0 8px 20px rgba(0,0,0,0.60);
      animation: pulseText 1.8s ease-in-out infinite;
    }

    @keyframes sweepLeft {
      0% { transform: translateX(-10px) rotate(-18deg); opacity: 0.45; }
      50% { transform: translateX(70px) rotate(-6deg); opacity: 0.85; }
      100% { transform: translateX(130px) rotate(5deg); opacity: 0.60; }
    }

    @keyframes sweepRight {
      0% { transform: translateX(10px) rotate(18deg); opacity: 0.42; }
      50% { transform: translateX(-70px) rotate(7deg); opacity: 0.80; }
      100% { transform: translateX(-130px) rotate(-5deg); opacity: 0.58; }
    }

    @keyframes centerGlowMove {
      0% { transform: translateX(-20px) rotate(-4deg); opacity: 0.25; }
      50% { transform: translateX(10px) rotate(2deg); opacity: 0.55; }
      100% { transform: translateX(34px) rotate(6deg); opacity: 0.35; }
    }

    @keyframes openLeftDoor {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-102%); }
    }

    @keyframes openRightDoor {
      0%   { transform: translateX(0); }
      100% { transform: translateX(102%); }
    }

    @keyframes seamGlow {
      0%   { opacity: 0.18; }
      50%  { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes seamFlash {
      0%   { width: 12px; opacity: 0.9; }
      40%  { width: 26px; opacity: 1; }
      100% { width: 14px; opacity: 0; }
    }

    @keyframes burstFlash {
      0%   { opacity: 0; transform: scale(0.88); }
      35%  { opacity: 1; transform: scale(1.02); }
      100% { opacity: 0; transform: scale(1.10); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.72; }
      50% { opacity: 1; }
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-120px) scale(0.55);
        opacity: 0;
      }
    }

    @media (min-width: 768px) {
      .entrance-bg {
        transform: scale(1.02);
      }

      .headline-wrap {
        align-items: center;
        padding-top: 0;
      }

      .headline-panel {
        max-width: 980px;
        padding: 28px 28px 22px;
        border-radius: 24px;
      }

      .eyebrow {
        letter-spacing: 0.34em;
      }

      .title {
        font-size: clamp(2.8rem, 6vw, 5.3rem);
      }

      .subtitle {
        max-width: 760px;
        font-size: clamp(1rem, 2.2vw, 1.55rem);
      }

      .status-line {
        bottom: 42px;
        max-width: none;
      }
    }
  </style>
</head>
<body>

  <div class="scene">
    <img
      src="{% static 'img/inside_majic_mall.png' %}"
      alt="MajicMall entrance"
      class="entrance-bg"
    >

    <div class="luxury-overlay"></div>

    <div class="spotlight gold-left"></div>
    <div class="spotlight red-right"></div>
    <div class="spotlight gold-center"></div>

    <div class="burst-flash"></div>
    <div class="particles"></div>

    <div class="door left">
      <div class="door-reflection"></div>
      <div class="door-handle"></div>
    </div>

    <div class="door right">
      <div class="door-reflection"></div>
      <div class="door-handle"></div>
    </div>

    <div class="center-seam-glow"></div>

    <div class="headline-wrap">
      <div class="headline-panel">
        <div class="eyebrow">Grand Opening</div>
        <h1 class="title">MajicMall<br>Megaverse</h1>
        <p class="subtitle">
          Step through the glass doors into an upscale world of merchants, zones, experiences, and discovery.
        </p>
      </div>
    </div>

    <div class="status-line">
      Opening the doors to MajicMall Megaverse...
    </div>
  </div>

  <script>
    const transitionDelay = 5200;
    const fadeDuration = 1000;
    const nextUrl = "{% url 'mall-home' %}";

    function spawnParticles() {
      const container = document.querySelector(".particles");
      if (!container) return;

      for (let i = 0; i < 18; i++) {
        const p = document.createElement("span");
        p.style.left = (48 + Math.random() * 4) + "%";
        p.style.top = "56%";
        container.appendChild(p);

        setTimeout(function () {
          p.remove();
        }, 2400);
      }
    }

    setTimeout(function () {
      spawnParticles();
    }, 1200);

    setTimeout(function () {
      document.body.style.opacity = "0";

      setTimeout(function () {
        window.location.href = nextUrl;
      }, fadeDuration);
    }, transitionDelay);
  </script>

</body>
</html>
