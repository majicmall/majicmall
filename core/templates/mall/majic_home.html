{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inside MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html,
body{
  margin:0;
  padding:0;
  min-height:100%;
  background:#000;
  font-family:Arial,sans-serif;
}

body{
  color:#fff;
  overflow-x:hidden;
  opacity:0;
  animation:pageFadeIn 1.6s ease forwards;
}

.scene{
  position:relative;
  min-height:100vh;
  overflow:hidden;
  background:#000;
}

.inside-bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;
  z-index:1;

  filter:
    brightness(.96)
    contrast(1.18)
    saturate(1.14)
    drop-shadow(0 0 0 rgba(255,255,255,.01));

  transform-origin:center center;
  backface-visibility:hidden;
  image-rendering:auto;

  animation:insideWalkForward 22s ease-out forwards;
}

.inside-overlay{
  position:fixed;
  inset:0;
  z-index:2;
  background:
    radial-gradient(circle at center, rgba(255,215,120,.10), transparent 48%),
    linear-gradient(to bottom, rgba(0,0,0,.02), rgba(0,0,0,.34));
  pointer-events:none;
}

.arrival-layer{
  position:relative;
  z-index:3;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 16px;
  opacity:0;
  animation:showControls 1.8s ease 5.8s forwards;
  box-sizing:border-box;
}

.arrival-card{
  width:100%;
  max-width:680px;
  text-align:center;
  background:rgba(0,0,0,.56);
  border:1px solid rgba(243,213,106,.25);
  border-radius:22px;
  padding:20px 16px;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:
    0 20px 60px rgba(0,0,0,.65),
    0 0 40px rgba(212,175,55,.10);
  animation:cardFloat 6s ease-in-out infinite;
}

.kicker{
  color:#f3d56a;
  font-weight:900;
  letter-spacing:.20em;
  text-transform:uppercase;
  font-size:.78rem;
  margin-bottom:8px;
}

.title{
  font-size:clamp(1.8rem,7.2vw,4rem);
  line-height:.98;
  font-weight:900;
  margin:0;
  text-shadow:
    0 0 22px rgba(255,215,0,.16),
    0 8px 28px rgba(0,0,0,.75);
}

.subtitle{
  margin:12px auto 0;
  max-width:580px;
  color:#f5f5f5;
  font-size:clamp(.9rem,3.2vw,1.12rem);
  line-height:1.42;
  font-weight:650;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-top:18px;
  width:100%;
  max-width:280px;
  padding:14px 22px;
  border-radius:18px;
  background:linear-gradient(135deg,#fff1a8,#d4af37);
  color:#111;
  font-size:1.05rem;
  font-weight:900;
  text-decoration:none;
  box-shadow:0 12px 30px rgba(212,175,55,.24);
  transition:.3s;
}

.btn:hover{
  transform:translateY(-2px);
}

@keyframes pageFadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes insideWalkForward{
  0%{
    transform:scale(1) translateY(0);
  }

  25%{
    transform:scale(1.045) translateY(-5px);
  }

  50%{
    transform:scale(1.10) translateY(-10px);
  }

  75%{
    transform:scale(1.17) translateY(-16px);
  }

  100%{
    transform:scale(1.26) translateY(-24px);
  }
}

@keyframes showControls{
  to{opacity:1;}
}

@keyframes cardFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

@media (min-width:768px){
  .arrival-card{
    padding:30px 28px;
    border-radius:26px;
  }

  .btn{
    width:auto;
    min-width:240px;
  }
}

@media (max-height:680px){
  .arrival-card{
    padding:16px 14px;
  }

  .subtitle{
    margin-top:10px;
    font-size:.88rem;
  }

  .btn{
    margin-top:14px;
    padding:12px 18px;
  }
}
</style>
</head>

<body>

<main class="scene">

  <img
    src="{% static 'img/inside_majic_mall.png' %}"
    class="inside-bg"
    alt="Inside MajicMall Megaverse"
  >

  <div class="inside-overlay"></div>

  <section class="arrival-layer">
    <div class="arrival-card">
      <div class="kicker">You Are Here</div>

      <h1 class="title">Inside<br>MajicMall Megaverse</h1>

      <p class="subtitle">
        You’ve arrived inside the mall. Take in the view, then continue to the directory when you're ready.
      </p>

      <a href="{% url 'mall-directory' %}" class="btn">
        Enter Directory
      </a>
    </div>
  </section>

</main>

</body>
</html>
