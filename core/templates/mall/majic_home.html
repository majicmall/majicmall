{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  height:100%;
}

.scene {
  position:relative;
  height:100vh;
}

/* FULL IMAGE FIRST */
.bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY APPEARS LATER */
.overlay {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity 1.5s ease;
}

.card {
  background:rgba(0,0,0,.6);
  padding:20px;
  border-radius:20px;
  color:white;
  text-align:center;
  border:1px solid gold;
}

.btn {
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:gold;
  color:black;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/inside_majic_mall.png' %}" class="bg">

  <div class="overlay" id="overlay">
    <div class="card">
      <h2>You Are Inside MajicMall Megaverse</h2>
      <p>Explore the mall, discover zones, and experience the Majic.</p>
      <a href="{% url 'mall-directory' %}" class="btn">Enter Directory</a>
    </div>
  </div>
</div>

<script>
setTimeout(()=>{
  document.getElementById("overlay").style.opacity="1";
},2000); // 👈 delay so image is seen FIRST
</script>

</body>
</html>
