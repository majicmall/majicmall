{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inside MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html,
body{
  margin:0;
  padding:0;
  min-height:100%;
  background:#000;
  font-family:Arial,sans-serif;
}

body{
  color:#fff;
  overflow-x:hidden;
  opacity:0;
  animation:pageFadeIn 1.2s ease forwards;
}

.scene{
  position:relative;
  min-height:100vh;
  overflow:hidden;
  background:#000;
}

.inside-bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;
  z-index:1;

  filter:
    brightness(.98)
    contrast(1.2)
    saturate(1.16);

  transform-origin:center center;
  backface-visibility:hidden;
  image-rendering:auto;

  animation:insideWalkForward 18s linear forwards;
}

.inside-overlay{
  position:fixed;
  inset:0;
  z-index:2;
  background:
    radial-gradient(circle at center, rgba(255,215,120,.10), transparent 48%),
    linear-gradient(to bottom, rgba(0,0,0,.02), rgba(0,0,0,.34));
  pointer-events:none;
}

.mall-light-sweep{
  position:fixed;
  inset:-20%;
  z-index:2;
  pointer-events:none;
  opacity:.0;
  background:
    linear-gradient(
      115deg,
      transparent 32%,
      rgba(255,235,170,.12) 45%,
      rgba(255,255,255,.18) 50%,
      rgba(212,175,55,.12) 55%,
      transparent 68%
    );
  transform:translateX(-40%) rotate(4deg);
  animation:mallLightSweep 8s ease-in-out 1.2s infinite;
  mix-blend-mode:screen;
}

.mall-glow-pulse{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:
    radial-gradient(circle at 48% 40%, rgba(255,215,120,.16), transparent 38%),
    radial-gradient(circle at 72% 62%, rgba(255,255,255,.07), transparent 24%);
  opacity:.55;
  animation:mallGlowPulse 5.8s ease-in-out infinite;
  mix-blend-mode:screen;
}

.arrival-layer{
  position:relative;
  z-index:3;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 16px;
  opacity:0;
  animation:showControls 1.8s ease 5.4s forwards;
  box-sizing:border-box;
}

.arrival-card{
  width:100%;
  max-width:680px;
  text-align:center;
  background:rgba(0,0,0,.56);
  border:1px solid rgba(243,213,106,.25);
  border-radius:22px;
  padding:20px 16px;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:
    0 20px 60px rgba(0,0,0,.65),
    0 0 40px rgba(212,175,55,.12);
  animation:cardFloat 6s ease-in-out infinite;
}

.kicker{
  color:#f3d56a;
  font-weight:900;
  letter-spacing:.20em;
  text-transform:uppercase;
  font-size:.78rem;
  margin-bottom:8px;
}

.title{
  font-size:clamp(1.8rem,7.2vw,4rem);
  line-height:.98;
  font-weight:900;
  margin:0;
  text-shadow:
    0 0 22px rgba(255,215,0,.18),
    0 8px 28px rgba(0,0,0,.75);
}

.subtitle{
  margin:12px auto 0;
  max-width:580px;
  color:#f5f5f5;
  font-size:clamp(.9rem,3.2vw,1.12rem);
  line-height:1.42;
  font-weight:650;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-top:18px;
  width:100%;
  max-width:280px;
  padding:14px 22px;
  border-radius:18px;
  background:linear-gradient(135deg,#fff1a8,#d4af37);
  color:#111;
  font-size:1.05rem;
  font-weight:900;
  text-decoration:none;
  box-shadow:0 12px 30px rgba(212,175,55,.24);
  transition:.3s;
}

.btn:hover{
  transform:translateY(-2px);
}

@keyframes pageFadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes insideWalkForward{
  0%{
    transform:scale(1.02) translateY(0);
  }

  20%{
    transform:scale(1.08) translateY(-6px);
  }

  40%{
    transform:scale(1.15) translateY(-13px);
  }

  60%{
    transform:scale(1.23) translateY(-21px);
  }

  80%{
    transform:scale(1.32) translateY(-29px);
  }

  100%{
    transform:scale(1.42) translateY(-38px);
  }
}

@keyframes insideWalkForwardMobile{
  0%{
    transform:scale(1.02) translateY(0);
  }

  20%{
    transform:scale(1.18) translateY(-10px);
  }

  40%{
    transform:scale(1.36) translateY(-22px);
  }

  60%{
    transform:scale(1.52) translateY(-38px);
  }

  80%{
    transform:scale(1.65) translateY(-50px);
  }

  100%{
    transform:scale(1.75) translateY(-60px);
  }
}

@keyframes showControls{
  to{opacity:1;}
}

@keyframes cardFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

@keyframes mallLightSweep{
  0%{
    opacity:0;
    transform:translateX(-55%) rotate(4deg);
  }

  22%{
    opacity:.8;
  }

  52%{
    opacity:.35;
  }

  100%{
    opacity:0;
    transform:translateX(55%) rotate(4deg);
  }
}

@keyframes mallGlowPulse{
  0%,100%{
    opacity:.42;
    transform:scale(1);
  }

  50%{
    opacity:.72;
    transform:scale(1.05);
  }
}

@media (min-width:768px){
  .arrival-card{
    padding:30px 28px;
    border-radius:26px;
  }

  .btn{
    width:auto;
    min-width:240px;
  }
}

@media (max-width:768px){
  .inside-bg{
    animation:insideWalkForwardMobile 34s linear forwards;
  }

  .mall-light-sweep{
    animation-duration:9.5s;
  }

  .arrival-layer{
    animation-delay:5.8s;
  }
}

@media (max-height:680px){
  .arrival-card{
    padding:16px 14px;
  }

  .subtitle{
    margin-top:10px;
    font-size:.88rem;
  }

  .btn{
    margin-top:14px;
    padding:12px 18px;
  }
}

.skip-directory {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 22px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 800;
  font-size: .95rem;
  letter-spacing: .03em;
  color: #111;
  background: linear-gradient(135deg,#fff3b0,#d4af37);
  border: 1px solid rgba(255,215,0,.65);
  box-shadow:
      0 0 18px rgba(255,215,0,.35),
      0 8px 25px rgba(0,0,0,.35);
  transition: .25s ease;
}

.skip-directory:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow:
      0 0 24px rgba(255,215,0,.6),
      0 12px 32px rgba(0,0,0,.45);
}

@media (max-width:768px) {
  .skip-directory {
    top:12px;
    right:12px;
    padding:10px 18px;
    font-size:.85rem;
  }
}

</style>
</head>

<body>

<a href="/directory/" class="skip-directory">
    ⏭ Skip To Directory
</a>


<main class="scene">

  <img
    src="{% static 'img/inside_majic_mall.png' %}"
    class="inside-bg"
    alt="Inside MajicMall Megaverse"
  >

  <div class="inside-overlay"></div>
  <div class="mall-glow-pulse"></div>
  <div class="mall-light-sweep"></div>

  <section class="arrival-layer">
    <div class="arrival-card">
      <div class="kicker">You Are Here</div>

      <h1 class="title">Inside<br>MajicMall Megaverse</h1>

      <p class="subtitle">
        You’ve arrived inside the mall. Take in the view, then continue to the directory when you're ready.
      </p>

      <a href="{% url 'mall-directory' %}" class="btn">
        Enter Directory
      </a>
    </div>
  </section>

</main>

</body>
</html>
