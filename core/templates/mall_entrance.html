{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
}

.scene {
  position:fixed;
  inset:0;
  overflow:hidden;
  background:#000;
}

/* FUSED CITY → GRAND ENTRANCE IMAGES */
.city-fill,
.city-main,
.grand-fill,
.grand-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.city-fill {
  z-index:1;
  filter:blur(16px) brightness(.46) saturate(1.18);
  transform:scale(1.14);
}

.city-main {
  z-index:2;
  filter:brightness(.98) contrast(1.05) saturate(1.04);
  animation:cityPushForward 9.2s ease-in-out forwards;
}

.grand-fill {
  z-index:3;
  opacity:0;
  filter:blur(8px) brightness(.56) saturate(1.08);
  transform:scale(1.02);
  animation:grandFadeIn 7.4s ease-in-out 4.2s forwards;
}

.grand-main {
  z-index:4;
  opacity:0;
  filter:brightness(1.02) contrast(1.08) saturate(1.06);
  animation:grandFusePush 8.2s ease-in-out 4.1s forwards;
}
@keyframes cityPushForward {

  0% {
    transform:scale(.96);
    opacity:1;
  }

  45% {
    transform:scale(1.01);
    opacity:1;
  }

  75% {
    transform:scale(1.05);
    opacity:.78;
  }

  100% {
    transform:scale(1.08);
    opacity:0;
  }
}

@keyframes grandFusePush {

  0% {
    opacity:0;
    transform:scale(.94);
  }

  35% {
    opacity:.38;
    transform:scale(.97);
  }

  65% {
    opacity:.82;
    transform:scale(1.0);
  }

  100% {
    opacity:1;
    transform:scale(1.06);
  }
}

.luxury-glow {
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(255,215,120,.18), transparent 46%),
    linear-gradient(to bottom, rgba(0,0,0,.03), rgba(0,0,0,.18));
  mix-blend-mode:screen;
}

.door {
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:7;
  overflow:hidden;
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  background:
    linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.06) 22%, rgba(255,255,255,.025) 48%, rgba(0,0,0,.08)),
    linear-gradient(to right, rgba(255,255,255,.14), rgba(255,255,255,.025));
  border:2px solid rgba(212,175,55,.42);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    inset 0 0 45px rgba(255,255,255,.08),
    0 0 30px rgba(212,175,55,.18);
  will-change:transform;
}

.door.left {
  left:0;
  animation:openLeft 3.1s cubic-bezier(.22,1,.36,1) .45s forwards;
}

.door.right {
  right:0;
  animation:openRight 3.1s cubic-bezier(.22,1,.36,1) .45s forwards;
}

.reflection {
  position:absolute;
  top:-25%;
  width:42%;
  height:150%;
  background:linear-gradient(to bottom, rgba(255,255,255,.36), rgba(255,255,255,.1) 24%, transparent 58%);
  opacity:0;
  pointer-events:none;
  animation:reflectMove 2.8s ease .65s forwards;
}

.door.left .reflection {
  right:10%;
  transform:skewX(-15deg);
}

.door.right .reflection {
  left:10%;
  transform:skewX(15deg);
}

.handle {
  position:absolute;
  top:50%;
  width:11px;
  height:98px;
  transform:translateY(-50%);
  border-radius:999px;
  background:linear-gradient(to bottom, #fff5bd, #d4af37 48%, #fff1a8);
  box-shadow:0 0 18px rgba(243,213,106,.72), inset 0 0 3px rgba(0,0,0,.35);
  overflow:hidden;
}

.door.left .handle { right:24px; }
.door.right .handle { left:24px; }

.handle::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,.95), transparent);
  opacity:0;
  animation:handleSweep 1.8s ease .85s forwards;
}

.seam-light {
  position:absolute;
  top:0;
  bottom:0;
  left:50%;
  width:10px;
  transform:translateX(-50%);
  z-index:8;
  background:linear-gradient(to bottom, transparent, rgba(255,240,180,1), transparent);
  box-shadow:0 0 20px rgba(255,223,128,.85), 0 0 70px rgba(255,223,128,.5);
  animation:seamFade 2.4s ease forwards;
  pointer-events:none;
}

.fade-bridge {
  position:absolute;
  inset:0;
  z-index:12;
  background:#000;
  opacity:0;
  pointer-events:none;
  animation:bridgeFade 7.9s linear forwards;
}

@keyframes openLeft { to { transform:translate3d(-105%,0,0); } }
@keyframes openRight { to { transform:translate3d(105%,0,0); } }

@keyframes reflectMove {
  0% { opacity:0; transform:translate3d(-70px,0,0) skewX(-15deg); }
  35% { opacity:.62; }
  100% { opacity:0; transform:translate3d(130px,0,0) skewX(-15deg); }
}

@keyframes handleSweep {
  0% { opacity:0; transform:translate3d(0,-45px,0); }
  40% { opacity:1; }
  100% { opacity:0; transform:translate3d(0,70px,0); }
}

@keyframes seamFade {
  0% { opacity:.15; width:8px; }
  38% { opacity:1; width:28px; }
  100% { opacity:0; width:12px; }
}

@keyframes bridgeFade {
  0%, 96% { opacity:0; }
  100% { opacity:.04; }
}
</style>
</head>

<body>

<div class="scene">
  <img src="{% static 'img/grand_entrance_city_view.png' %}" class="city-fill" alt="">
  <img src="{% static 'img/grand_entrance_city_view.png' %}" class="city-main" alt="MajicMall Megaverse City Entrance">

  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="grand-fill" alt="">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="grand-main" alt="MajicMall Grand Entrance">

  <div class="luxury-glow"></div>

  <div class="door left">
    <div class="reflection"></div>
    <div class="handle"></div>
  </div>

  <div class="door right">
    <div class="reflection"></div>
    <div class="handle"></div>
  </div>

  <div class="seam-light"></div>
  <div class="fade-bridge"></div>
</div>

<script>
setTimeout(() => {

  document.body.style.opacity = ".92";

  setTimeout(() => {

    window.location.href = "{% url 'mall-home' %}";

  }, 950);

}, 11800);
</script>

</body>
</html>
