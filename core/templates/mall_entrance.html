{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entering MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  overflow:hidden;
}

/* SCENE */
.scene {
  position:fixed;
  inset:0;
}

/* CITY */
.city {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  opacity:0;
  animation: cityFadeIn 1.5s ease forwards, zoomCity 6s 1.5s ease forwards;
}

/* INSIDE */
.inside {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
  opacity:0;
  animation: revealInside 3s 4.5s ease forwards;
}

/* CURTAINS */
.curtain {
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:5;
}

.left {
  left:0;
  animation: openLeft 2s ease forwards;
}

.right {
  right:0;
  animation: openRight 2s ease forwards;
}

/* TITLE */
.title {
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  color:#f5d76e;
  text-align:center;
  font-size:clamp(2rem, 6vw, 3.5rem);
  z-index:6;
  opacity:0;
  animation: fadeText 5s 1s ease forwards;
}

/* ANIMATIONS */
@keyframes openLeft {
  to { transform:translateX(-110%); }
}

@keyframes openRight {
  to { transform:translateX(110%); }
}

@keyframes cityFadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

@keyframes zoomCity {
  0% { transform:scale(1); }
  60% { transform:scale(1.2); opacity:1; }
  100% { transform:scale(1.4); opacity:0; }
}

@keyframes revealInside {
  from { opacity:0; transform:scale(1.1); }
  to { opacity:1; transform:scale(1); }
}

@keyframes fadeText {
  0% { opacity:0; }
  20% { opacity:1; }
  80% { opacity:1; }
  100% { opacity:0; }
}
</style>
</head>

<body>

<div class="scene">

  <!-- CITY VIEW -->
  <img src="{% static 'img/grand_entrance_city_view.png' %}" class="city">

  <!-- INSIDE VIEW -->
  <img src="{% static 'img/inside_majic_mall.png' %}" class="inside">

  <!-- CURTAINS -->
  <img src="{% static 'img/curtain_left.png' %}" class="curtain left">
  <img src="{% static 'img/curtain_right.png' %}" class="curtain right">

  <!-- TEXT -->
  <div class="title">
    Welcome to MajicMall Megaverse
  </div>

</div>

<script>
setTimeout(function() {
  window.location.href = "/directory/";
}, 7500);
</script>

</body>
</html>
