{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
}

.scene {
  position:fixed;
  inset:0;
  overflow:hidden;
  background:#000;
}

.city-fill,
.city-main,
.grand-fill,
.grand-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.city-fill {
  z-index:1;
  filter:blur(16px) brightness(.46) saturate(1.18);
  transform:scale(1.14);
}

.city-main {
  z-index:2;
  filter:brightness(.98) contrast(1.05) saturate(1.04);
  animation:cityPushForward 9.2s ease-in-out forwards;
}

.grand-fill {
  z-index:3;
  opacity:0;
  filter:blur(8px) brightness(.56) saturate(1.08);
  transform:scale(1.02);
  animation:grandFadeIn 7.4s ease-in-out 4.2s forwards;
}

.grand-main {
  z-index:4;
  opacity:0;
  filter:brightness(1.02) contrast(1.08) saturate(1.06);
  animation:grandFusePush 8.2s ease-in-out 4.1s forwards;
}

@keyframes cityPushForward {
  0% { transform:scale(.96); opacity:1; }
  45% { transform:scale(1.01); opacity:1; }
  75% { transform:scale(1.05); opacity:.78; }
  100% { transform:scale(1.08); opacity:0; }
}

@keyframes grandFusePush {
  0% { opacity:0; transform:scale(.94); }
  35% { opacity:.38; transform:scale(.97); }
  65% { opacity:.82; transform:scale(1); }
  100% { opacity:1; transform:scale(1.06); }
}

@keyframes grandFadeIn {
  from { opacity:0; }
  to { opacity:.9; }
}

.luxury-glow {
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(255,215,120,.18), transparent 46%),
    linear-gradient(to bottom, rgba(0,0,0,.03), rgba(0,0,0,.18));
  mix-blend-mode:screen;
}

.spotlight {
  position:absolute;
  top:-30%;
  width:38vw;
  height:170vh;
  z-index:6;
  opacity:.34;
  pointer-events:none;
  filter:blur(14px);
  mix-blend-mode:screen;
}

.spotlight-left {
  left:-12vw;
  background:linear-gradient(to bottom, rgba(255,255,220,.95), rgba(255,215,120,.22), transparent);
  transform:rotate(-18deg);
  animation:leftSweep 5.5s ease-in-out infinite alternate;
}

.spotlight-right {
  right:-12vw;
  background:linear-gradient(to bottom, rgba(255,255,220,.95), rgba(255,215,120,.22), transparent);
  transform:rotate(18deg);
  animation:rightSweep 5.5s ease-in-out infinite alternate;
}

.sparkles {
  position:absolute;
  inset:0;
  z-index:6;
  pointer-events:none;
}

.sparkles span {
  position:absolute;
  width:7px;
  height:7px;
  border-radius:50%;
  background:#fff3c2;
  box-shadow:0 0 8px #fff3c2, 0 0 18px rgba(255,215,90,1);
  opacity:0;
  animation:sparkleFloat 3.6s ease-in-out infinite;
}

.sparkles span:nth-child(1) { top:16%; left:22%; animation-delay:0s; }
.sparkles span:nth-child(2) { top:22%; left:68%; animation-delay:.8s; }
.sparkles span:nth-child(3) { top:36%; left:44%; animation-delay:1.2s; }
.sparkles span:nth-child(4) { top:28%; left:80%; animation-delay:1.6s; }
.sparkles span:nth-child(5) { top:42%; left:14%; animation-delay:2s; }
.sparkles span:nth-child(6) { top:18%; left:54%; animation-delay:2.4s; }
.sparkles span:nth-child(7) { top:48%; left:62%; animation-delay:2.8s; }
.sparkles span:nth-child(8) { top:30%; left:34%; animation-delay:3.2s; }

.camera-flash {
  position:absolute;
  inset:0;
  z-index:7;
  pointer-events:none;
  background:
    radial-gradient(circle at 25% 25%, rgba(255,255,255,.55), transparent 16%),
    radial-gradient(circle at 72% 30%, rgba(255,215,120,.42), transparent 18%);
  opacity:0;
  animation:flashBurst 5s ease-in-out infinite;
  mix-blend-mode:screen;
}

@keyframes goldBigBang {
  0% {
    opacity:0;
    transform:translate(-50%,-50%) scale(.1) rotate(0deg);
    filter:brightness(.75);
  }

  8% {
    opacity:1;
    transform:translate(-50%,-50%) scale(2.2) rotate(30deg);
    filter:brightness(2.6);
  }

  24% {
    opacity:1;
    transform:
      translate(
        calc(-50% + var(--x)),
        calc(-50% + var(--y))
      )
      scale(1.15)
      rotate(360deg);
    filter:brightness(2.1);
  }

  52% {
    opacity:.95;
    transform:
      translate(
        calc(-50% + var(--x)),
        calc(-50% + 42vh)
      )
      scale(.9)
      rotate(720deg);
    filter:brightness(1.65);
  }

  100% {
    opacity:0;
    transform:
      translate(
        calc(-50% + var(--x)),
        calc(-50% + 128vh)
      )
      scale(.4)
      rotate(1080deg);
    filter:brightness(.65);
  }
}

.entrance-rays {
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
  background:radial-gradient(circle at center, rgba(255,240,180,.18), transparent 55%);
  animation:rayPulse 4.8s ease-in-out infinite;
}

.door {
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:8;
  overflow:hidden;
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  background:
    linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.06) 22%, rgba(255,255,255,.025) 48%, rgba(0,0,0,.08)),
    linear-gradient(to right, rgba(255,255,255,.14), rgba(255,255,255,.025));
  border:2px solid rgba(212,175,55,.42);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    inset 0 0 45px rgba(255,255,255,.08),
    0 0 30px rgba(212,175,55,.18);
  will-change:transform;
}

.door.left {
  left:0;
  animation:openLeft 6.2s cubic-bezier(.16,.84,.22,1) .85s forwards;
}

.door.right {
  right:0;
  animation:openRight 6.2s cubic-bezier(.16,.84,.22,1) .85s forwards;
}

.reflection {
  position:absolute;
  top:-25%;
  width:42%;
  height:150%;
  background:linear-gradient(to bottom, rgba(255,255,255,.36), rgba(255,255,255,.1) 24%, transparent 58%);
  opacity:0;
  pointer-events:none;
  animation:reflectMove 2.8s ease .65s forwards;
}

.door.left .reflection {
  right:10%;
  transform:skewX(-15deg);
}

.door.right .reflection {
  left:10%;
  transform:skewX(15deg);
}

.handle {
  position:absolute;
  top:50%;
  width:20px;
  height:150px;
  transform:translateY(-50%);
  border-radius:999px;
  background:linear-gradient(to bottom, #fffce5, #ffe793, #d4af37, #9b6b10, #fff1a8);
  box-shadow:
    0 0 16px rgba(255,225,110,.95),
    0 0 40px rgba(212,175,55,.65),
    0 0 70px rgba(255,215,0,.28),
    inset 0 0 8px rgba(255,255,255,.75);
  overflow:hidden;
}

.door.left .handle {
  right:34px;
}

.door.right .handle {
  left:34px;
}

.handle::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,.95), transparent);
  opacity:0;
  animation:handleSweep 1.8s ease .85s forwards;
}

.seam-light {
  position:absolute;
  top:0;
  bottom:0;
  left:50%;
  width:10px;
  transform:translateX(-50%);
  z-index:9;
  background:linear-gradient(to bottom, transparent, rgba(255,240,180,1), transparent);
  box-shadow:
    0 0 24px rgba(255,223,128,.9),
    0 0 90px rgba(255,223,128,.62);
  animation:seamFade 3s ease forwards;
  pointer-events:none;
}

.fade-bridge {
  position:absolute;
  inset:0;
  z-index:12;
  background:#000;
  opacity:0;
  pointer-events:none;
  animation:bridgeFade 7.9s linear forwards;
}

@keyframes leftSweep {
  from { transform:rotate(-24deg) translateX(-40px); }
  to { transform:rotate(-8deg) translateX(140px); }
}

@keyframes rightSweep {
  from { transform:rotate(24deg) translateX(40px); }
  to { transform:rotate(8deg) translateX(-140px); }
}

@keyframes sparkleFloat {
  0% { opacity:0; transform:translateY(12px) scale(.4); }
  30% { opacity:1; }
  60% { opacity:.9; }
  100% { opacity:0; transform:translateY(-32px) scale(1.4); }
}

@keyframes flashBurst {
  0%,100% { opacity:0; }
  42% { opacity:.82; }
  48% { opacity:.1; }
  54% { opacity:.58; }
  60% { opacity:0; }
}

@keyframes rayPulse {
  0%,100% { opacity:.42; transform:scale(1); }
  50% { opacity:.72; transform:scale(1.05); }
}

@keyframes openLeft {
  to { transform:translate3d(-105%,0,0); }
}

@keyframes openRight {
  to { transform:translate3d(105%,0,0); }
}

@keyframes reflectMove {
  0% { opacity:0; transform:translate3d(-70px,0,0) skewX(-15deg); }
  35% { opacity:.62; }
  100% { opacity:0; transform:translate3d(130px,0,0) skewX(-15deg); }
}

@keyframes handleSweep {
  0% { opacity:0; transform:translate3d(0,-45px,0); }
  40% { opacity:1; }
  100% { opacity:0; transform:translate3d(0,70px,0); }
}

@keyframes seamFade {
  0% { opacity:.15; width:8px; }
  38% { opacity:1; width:32px; }
  100% { opacity:0; width:12px; }
}

@keyframes bridgeFade {
  0%, 96% { opacity:0; }
  100% { opacity:.04; }
}
</style>
</head>
