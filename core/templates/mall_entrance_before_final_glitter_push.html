html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
}

.scene {
  position:fixed;
  inset:0;
  overflow:hidden;
  background:#000;
}

.city-fill,
.city-main,
.grand-fill,
.grand-main {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.city-fill {
  z-index:1;
  filter:blur(16px) brightness(.46) saturate(1.18);
  transform:scale(1.14);
}

.city-main {
  z-index:2;
  filter:brightness(.98) contrast(1.05) saturate(1.04);
  animation:cityPushForward 9.2s ease-in-out forwards;
}

.grand-fill {
  z-index:3;
  opacity:0;
  filter:blur(8px) brightness(.56) saturate(1.08);
  transform:scale(1.02);
  animation:grandFadeIn 7.4s ease-in-out 4.2s forwards;
}

.grand-main {
  z-index:4;
  opacity:0;
  filter:brightness(1.02) contrast(1.08) saturate(1.06);
  animation:grandFusePush 8.2s ease-in-out 4.1s forwards;
}

@keyframes cityPushForward {
  0% { transform:scale(.96); opacity:1; }
  45% { transform:scale(1.01); opacity:1; }
  75% { transform:scale(1.05); opacity:.78; }
  100% { transform:scale(1.08); opacity:0; }
}

@keyframes grandFusePush {
  0% { opacity:0; transform:scale(.94); }

}

@keyframes dustLayerFade {
  0% { opacity:0; }
  10% { opacity:1; }
  82% { opacity:.95; }
  100% { opacity:0; }
}

@keyframes flowDust {
  0% {
    opacity:0;
    transform:translate(-50%,-50%) scale(.35);
    filter:brightness(.8);
  }

  8% {
    opacity:.95;
    transform:translate(-50%,-50%) scale(calc(.65 * var(--z)));
    filter:brightness(2.35);
  }

  34% {
    opacity:.95;
    transform:
      translate(
        calc(-50% + var(--x)),
        calc(-50% + var(--y))
      )
      scale(calc(.72 * var(--z)));
    filter:brightness(2);
  }

  68% {
    opacity:.72;
    transform:
      translate(
        calc(-50% + var(--x) * 1.04),
        calc(-50% + var(--y) + 28vh)
      )
      scale(calc(.58 * var(--z)));
    filter:brightness(1.45);
  }

  100% {
    opacity:0;
    transform:
      translate(
        calc(-50% + var(--x) * 1.08),
        calc(-50% + var(--y) + 78vh)
      )
      scale(calc(.32 * var(--z)));
    filter:brightness(.7);
  }
}

@keyframes glitterTwinkle {
  from {
    filter:brightness(1.05);
  }

  to {
    filter:brightness(2.45);
  }
}

.entrance-rays {
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
  background:radial-gradient(circle at center, rgba(255,240,180,.18), transparent 55%);
  animation:rayPulse 4.8s ease-in-out infinite;
}

.door {
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:8;
  overflow:hidden;
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  background:
    linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.06) 22%, rgba(255,255,255,.025) 48%, rgba(0,0,0,.08)),
    linear-gradient(to right, rgba(255,255,255,.14), rgba(255,255,255,.025));
  border:2px solid rgba(212,175,55,.42);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    inset 0 0 45px rgba(255,255,255,.08),
    0 0 30px rgba(212,175,55,.18);
  will-change:transform;
}

.door.left {
  left:0;
  animation:openLeft 6.2s cubic-bezier(.16,.84,.22,1) .85s forwards;
}

.door.right {
  right:0;
  animation:openRight 6.2s cubic-bezier(.16,.84,.22,1) .85s forwards;
}

.reflection {
  position:absolute;
  top:-25%;
  width:42%;
  height:150%;
  background:linear-gradient(to bottom, rgba(255,255,255,.36), rgba(255,255,255,.1) 24%, transparent 58%);
  opacity:0;
  pointer-events:none;
  animation:reflectMove 2.8s ease .65s forwards;
}

.door.left .reflection {
  right:10%;
  transform:skewX(-15deg);
}

.door.right .reflection {
  left:10%;
  transform:skewX(15deg);
}

.handle {
  position:absolute;
  top:50%;
  width:20px;
  height:150px;
  transform:translateY(-50%);
  border-radius:999px;
  background:linear-gradient(to bottom, #fffce5, #ffe793, #d4af37, #9b6b10, #fff1a8);
  box-shadow:
    0 0 16px rgba(255,225,110,.95),
    0 0 40px rgba(212,175,55,.65),
    0 0 70px rgba(255,215,0,.28),
    inset 0 0 8px rgba(255,255,255,.75);
  overflow:hidden;
}

.door.left .handle {
  right:34px;
}

.door.right .handle {
  left:34px;
}

.handle::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,.95), transparent);
  opacity:0;
  animation:handleSweep 1.8s ease .85s forwards;
}

.seam-light {
  position:absolute;
  top:0;
  bottom:0;
  left:50%;
  width:10px;
  transform:translateX(-50%);
  z-index:9;
  background:linear-gradient(to bottom, transparent, rgba(255,240,180,1), transparent);
  box-shadow:
    0 0 24px rgba(255,223,128,.9),
    0 0 90px rgba(255,223,128,.62);
  animation:seamFade 3s ease forwards;
  pointer-events:none;
}

.fade-bridge {
  position:absolute;
  inset:0;
  z-index:12;
  background:#000;
  opacity:0;
  pointer-events:none;
  animation:bridgeFade 7.9s linear forwards;
}

@keyframes leftSweep {
  from { transform:rotate(-24deg) translateX(-40px); }
  to { transform:rotate(-8deg) translateX(140px); }
}

@keyframes rightSweep {
  from { transform:rotate(24deg) translateX(40px); }
  to { transform:rotate(8deg) translateX(-140px); }
}

@keyframes sparkleFloat {
  0% { opacity:0; transform:translateY(12px) scale(.4); }
  30% { opacity:1; }
  60% { opacity:.9; }
  100% { opacity:0; transform:translateY(-32px) scale(1.4); }
}

@keyframes flashBurst {
  0%,100% { opacity:0; }
  42% { opacity:.82; }
  48% { opacity:.1; }
  54% { opacity:.58; }
  60% { opacity:0; }
}

@keyframes rayPulse {
  0%,100% { opacity:.42; transform:scale(1); }
  50% { opacity:.72; transform:scale(1.05); }
}

@keyframes openLeft {
  to { transform:translate3d(-105%,0,0); }
}

@keyframes openRight {
  to { transform:translate3d(105%,0,0); }
}

@keyframes reflectMove {
  0% { opacity:0; transform:translate3d(-70px,0,0) skewX(-15deg); }
  35% { opacity:.62; }
  100% { opacity:0; transform:translate3d(130px,0,0) skewX(-15deg); }
}

@keyframes handleSweep {
  0% { opacity:0; transform:translate3d(0,-45px,0); }
  40% { opacity:1; }
  100% { opacity:0; transform:translate3d(0,70px,0); }
}

@keyframes seamFade {
  0% { opacity:.15; width:8px; }
  38% { opacity:1; width:32px; }
  100% { opacity:0; width:12px; }
}

@keyframes bridgeFade {
  0%, 96% { opacity:0; }
  100% { opacity:.04; }
}
</style>
</head>

<body>

  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="grand-fill" alt="">
  <img src="{% static 'img/majicmall_grand_entrance.png' %}" class="grand-main" alt="MajicMall Grand Entrance">

  <div class="luxury-glow"></div>

  <div class="spotlight spotlight-left"></div>
