{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  font-family:'Montserrat', sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* PAGE BASE */
.page {
  position:relative;
  min-height:100vh;
  overflow:hidden;
}

/* 🌆 CITY BACKGROUND */
.city-bg {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  z-index:0;
  filter: brightness(0.35) contrast(1.1) saturate(1.2);
}

/* DARK OVERLAY FOR READABILITY */
.overlay {
  position:fixed;
  inset:0;
  z-index:1;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.65), rgba(0,0,0,0.85)),
    radial-gradient(circle at top, rgba(255,215,0,0.12), transparent 40%);
}

/* 🎥 SHARPER SPOTLIGHTS */
.spotlight {
  position:fixed;
  top:-20%;
  width:40vw;
  height:140vh;
  z-index:2;
  pointer-events:none;
  opacity:0.65;
  mix-blend-mode:screen;
  filter: blur(14px);

  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0.9),
    rgba(255,255,255,0.25) 40%,
    transparent 70%
  );
}

.spotlight.left {
  left:-20vw;
  transform:rotate(-18deg);
  animation:swayLeft 6s ease-in-out infinite alternate;
}

.spotlight.right {
  right:-20vw;
  transform:rotate(18deg);
  animation:swayRight 6.5s ease-in-out infinite alternate;
}

@keyframes swayLeft {
  from { transform:translateX(-40px) rotate(-18deg); }
  to { transform:translateX(140px) rotate(-8deg); }
}

@keyframes swayRight {
  from { transform:translateX(40px) rotate(18deg); }
  to { transform:translateX(-140px) rotate(8deg); }
}

/* CONTENT */
.content-wrap {
  position:relative;
  z-index:3;
  max-width:1200px;
  margin:0 auto;
  padding:28px 18px 60px;
}

/* HERO */
.hero {
  min-height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-inner {
  max-width:720px;
  padding:28px;
  border-radius:28px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(8px);
  border:1px solid rgba(212,175,55,0.2);
}

/* TITLE */
.title {
  font-family:'Cinzel', serif;
  font-size:clamp(2.8rem,10vw,4.5rem);
  font-weight:900;

  background:linear-gradient(90deg,#fff1a8,#d4af37,#fff1a8);
  background-clip:text;
  -webkit-background-clip:text;

  color:transparent;
  -webkit-text-fill-color:transparent;
}

.megaverse {
  display:block;
  font-size:clamp(3rem,11vw,5rem);
}

/* ACCENT */
.red-accent {
  margin:20px auto;
  width:120px;
  height:4px;
  border-radius:999px;
  background:linear-gradient(90deg,#8b0000,#ff2d2d,#8b0000);
}

/* TEXT */
.subtitle {
  font-size:clamp(1rem,4vw,1.3rem);
  font-weight:600;
  line-height:1.6;
}

/* BUTTON */
.cta {
  margin-top:26px;
  display:inline-block;
  padding:16px 28px;
  border-radius:30px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(135deg,#7f1010,#dc2626);
}

/* CAROUSEL */
.carousel-wrap {
  margin-top:40px;
  overflow:hidden;
}

.carousel-track {
  display:flex;
  gap:18px;
  animation:slide 30s linear infinite;
}

.carousel-card {
  width:300px;
  height:380px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.carousel-card img {
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.7;
}

@keyframes slide {
  from { transform:translateX(0); }
  to { transform:translateX(-50%); }
}
</style>
</head>

<body>

<div class="page">

  <!-- 🌆 ADD YOUR SKYLINE IMAGE HERE -->
  <img src="{% static 'img/city_skyline.jpg' %}" class="city-bg" alt="City Skyline">

  <div class="overlay"></div>

  <div class="spotlight left"></div>
  <div class="spotlight right"></div>

  <div class="content-wrap">

    <section class="hero">
      <div class="hero-inner">

        <h1 class="title">
          MajicMall
          <span class="megaverse">Megaverse</span>
        </h1>

        <div class="red-accent"></div>

        <p class="subtitle">
          The Mega Shopping Experience<br><br>

          <strong style="color:#d4af37;">Shop.</strong>
          Work.
          <strong style="color:#dc2626;"> Play.</strong>
          Imagine.
          <strong style="color:#d4af37;"> Create.</strong><br><br>

          A world of discovery, entertainment, opportunity, and unforgettable experiences — all in one place.
        </p>

        <a href="{% url 'mall-entrance' %}" class="cta">
          Enter MajicMall Megaverse
        </a>

      </div>
    </section>

    <div class="carousel-wrap">
      <div class="carousel-track">

        <div class="carousel-card">
          <img src="{% static 'img/majic_directory.png' %}">
        </div>

        <div class="carousel-card">
          <img src="{% static 'img/majic_directory.png' %}">
        </div>

        <div class="carousel-card">
          <img src="{% static 'img/majic_directory.png' %}">
        </div>

        <div class="carousel-card">
          <img src="{% static 'img/majic_directory.png' %}">
        </div>

      </div>
    </div>

  </div>
</div>

</body>
</html>
