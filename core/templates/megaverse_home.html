{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:'Montserrat', sans-serif;
  color:#fff;
}

/* MAIN CONTAINER */
.scene {
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

/* 🎥 MOVING SPOTLIGHTS */
.spotlight {
  position:absolute;
  width:300px;
  height:900px;
  background:radial-gradient(circle, rgba(255,255,255,0.35), transparent 60%);
  filter:blur(80px);
  opacity:0.5;
  animation:moveLight 8s linear infinite;
}

.spotlight.left {
  left:-100px;
  animation-direction:alternate;
}

.spotlight.right {
  right:-100px;
  animation-direction:alternate-reverse;
}

@keyframes moveLight {
  0% { transform:translateY(-40%) rotate(10deg); }
  100% { transform:translateY(40%) rotate(-10deg); }
}

/* BACKGROUND GRADIENT */
.bg-gradient {
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(255,215,0,0.15), transparent 40%),
    linear-gradient(to bottom, #000 20%, #111 60%, #000);
  z-index:1;
}

/* CONTENT */
.content {
  position:relative;
  z-index:3;
  max-width:600px;
  padding:20px;
}

/* TITLE */
.title {
  font-family:'Playfair Display', serif;
  font-size:clamp(2.8rem,10vw,4.5rem);
  font-weight:800;
  line-height:1;

  background:linear-gradient(90deg,#fff1a8,#d4af37,#fff1a8);

  /* ✅ compatibility fix */
  background-clip: text;
  -webkit-background-clip: text;

  color: transparent;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 20px rgba(255,215,0,0.25),
    0 8px 30px rgba(0,0,0,0.8);
}

/* MEGAVERSE (slightly larger emphasis) */
.megaverse {
  display:block;
  font-size:clamp(3rem,11vw,5rem);
  margin-top:8px;
}

/* SUBTEXT */
.subtitle {
  margin-top:18px;
  font-size:clamp(1rem,4vw,1.3rem);
  color:#eee;
  font-weight:500;
  line-height:1.5;
}

/* BUTTON */
.cta {
  margin-top:28px;
  display:inline-block;
  padding:16px 28px;
  border-radius:30px;
  font-weight:800;
  font-size:1.1rem;
  text-decoration:none;
  color:#111;

  background:linear-gradient(135deg,#fff1a8,#d4af37);
  box-shadow:
    0 12px 30px rgba(212,175,55,0.4),
    0 0 15px rgba(255,215,0,0.5);

  transition:all 0.25s ease;
}

.cta:hover {
  transform:translateY(-2px);
  box-shadow:
    0 18px 40px rgba(212,175,55,0.6),
    0 0 25px rgba(255,215,0,0.7);
}

/* RED SHIMMER LINE */
.red-accent {
  margin:20px auto 0;
  width:120px;
  height:4px;
  border-radius:999px;
  background:linear-gradient(90deg,#8b0000,#ff2d2d,#8b0000);
  box-shadow:0 0 10px rgba(255,0,0,0.6);
  animation:glowRed 2s ease-in-out infinite alternate;
}

@keyframes glowRed {
  from { opacity:0.6; }
  to { opacity:1; }
}

</style>
</head>

<body>

<div class="scene">

  <div class="bg-gradient"></div>

  <!-- moving spotlights -->
  <div class="spotlight left"></div>
  <div class="spotlight right"></div>

  <div class="content">

    <h1 class="title">
      MajicMall
      <span class="megaverse">Megaverse</span>
    </h1>

    <div class="red-accent"></div>

    <p class="subtitle">
      Step into a world of luxury, discovery, and immersive experiences.
    </p>

    <a href="{% url 'mall-entrance' %}" class="cta">
      Enter MajicMall Megaverse
    </a>

  </div>

</div>

</body>
</html>
