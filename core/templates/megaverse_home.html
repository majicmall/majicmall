{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MajicMall Megaverse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      opacity: 1;
      transition: opacity 0.9s ease;
      overflow-x: hidden;
    }

    .hero-bg {
      position: relative;
      min-height: 100vh;
      background:
        radial-gradient(circle at top center, rgba(255, 215, 0, 0.12), transparent 24%),
        linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.76)),
        url("{% static 'img/majicmall_front_view.png' %}") center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      overflow: hidden;
    }

    .hero-panel {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1040px;
      text-align: center;
      padding: 36px 24px;
      border-radius: 28px;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 0 1px rgba(212, 175, 55, 0.18),
        0 16px 48px rgba(0, 0, 0, 0.50);
    }

    .eyebrow {
      color: #f3d56a;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin-bottom: 16px;
    }

    .hero-title {
      color: #ffffff;
      font-size: clamp(2.5rem, 6vw, 6rem);
      font-weight: 900;
      margin: 0;
    }

    .hero-subtitle {
      margin-top: 20px;
      color: #f4f4f4;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .cta-row {
      margin-top: 30px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* 🔥 ENHANCED BUTTON */
    .cta-primary {
      position: relative;
      overflow: hidden;
      padding: 16px 28px;
      border-radius: 18px;
      font-size: 1.1rem;
      font-weight: 900;
      text-decoration: none;
      background: linear-gradient(135deg, #f2c94c, #f7d774);
      color: #111;
      box-shadow:
        0 12px 30px rgba(242, 201, 76, 0.18),
        inset 0 -2px 0 rgba(0, 0, 0, 0.12);
      transition: all 0.25s ease;
    }

    .cta-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow:
        0 18px 40px rgba(242, 201, 76, 0.28);
    }

    /* Glow layer */
    .cta-primary::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle, rgba(255, 223, 128, 0.5), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .cta-primary:hover::after {
      opacity: 1;
    }

    /* Shine sweep */
    .cta-primary::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 120%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
      );
      transform: skewX(-20deg);
    }

    .cta-primary.shine::before {
      animation: shineSweep 0.8s ease;
    }

    @keyframes shineSweep {
      0% { left: -120%; }
      100% { left: 120%; }
    }

    .cta-secondary {
      padding: 16px 28px;
      border-radius: 18px;
      font-size: 1.1rem;
      font-weight: bold;
      background: #111;
      color: #fff;
      border: 1px solid #333;
    }

    .entry-status {
      margin-top: 15px;
      color: #f3d56a;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>

  <section class="hero-bg">
    <div class="hero-panel">

      <div class="eyebrow">Welcome To</div>

      <h1 class="hero-title">
        MajicMall<br>Megaverse
      </h1>

      <p class="hero-subtitle">
        A world of shopping, experiences, and discovery.
      </p>

      <div class="cta-row">
        <a href="{% url 'mall-entrance' %}" id="enterMajicMallBtn" class="cta-primary">
          Enter MajicMall
        </a>

        <a href="{% url 'mall-directory' %}" class="cta-secondary">
          View Directory
        </a>
      </div>

      <div id="entryStatus" class="entry-status"></div>

    </div>
  </section>

  <!-- 🚀 BUTTON LOGIC -->
  <script>
    (function () {
      const enterBtn = document.getElementById("enterMajicMallBtn");
      const status = document.getElementById("entryStatus");

      if (!enterBtn) return;

      // Shine on hover
      enterBtn.addEventListener("mouseenter", function () {
        this.classList.add("shine");
        setTimeout(() => this.classList.remove("shine"), 800);
      });

      // Click transition
      enterBtn.addEventListener("click", function (e) {
        e.preventDefault();

        const nextUrl = this.getAttribute("href");

        this.classList.add("shine");

        if (status) {
          status.textContent = "Opening the doors to MajicMall Megaverse...";
        }

        document.body.style.opacity = "0";

        setTimeout(function () {
          window.location.href = nextUrl;
        }, 900);
      });
    })();
  </script>

</body>
</html>
