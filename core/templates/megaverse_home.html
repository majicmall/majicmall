{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  font-family:'Montserrat', sans-serif;
  color:#fff;
  overflow-x:hidden;
}

.city-bg {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  z-index:0;
  filter:brightness(0.65) contrast(1.15) saturate(1.2);
}

.overlay {
  position:fixed;
  inset:0;
  z-index:1;
  background:linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.64) 68%, #000 100%);
}

.stars {
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
}

.star {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 8px rgba(255,255,255,0.8);
  animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity:0.18; transform:scale(0.8); }
  50% { opacity:1; transform:scale(1.55); }
}

.spotlight {
  position:fixed;
  top:-20%;
  width:40vw;
  height:140vh;
  z-index:3;
  opacity:0.55;
  filter:blur(18px);
  mix-blend-mode:screen;
  pointer-events:none;
}

.spotlight.left {
  left:-15vw;
  background:linear-gradient(to bottom, rgba(255,255,255,0.85), transparent);
  animation:swayLeft 6s ease-in-out infinite alternate;
}

.spotlight.right {
  right:-15vw;
  background:linear-gradient(to bottom, rgba(255,255,255,0.85), transparent);
  animation:swayRight 6s ease-in-out infinite alternate;
}

@keyframes swayLeft {
  from { transform:rotate(-20deg) translateX(-40px); }
  to { transform:rotate(-5deg) translateX(140px); }
}

@keyframes swayRight {
  from { transform:rotate(20deg) translateX(40px); }
  to { transform:rotate(5deg) translateX(-140px); }
}

.wrapper {
  position:relative;
  z-index:4;
  max-width:1200px;
  margin:0 auto;
  padding:40px 20px 80px;
}

.billboard {
  width:100%;
  max-width:900px;
  margin:0 auto 30px;
  padding:16px 18px;
  border-radius:16px;
  background:linear-gradient(135deg, rgba(0,0,0,0.58), rgba(40,20,20,0.42));
  border:1px solid rgba(212,175,55,0.34);
  text-align:center;
  font-weight:800;
  letter-spacing:1px;
  font-size:14px;
  color:#fff1a8;
  box-shadow:0 0 30px rgba(212,175,55,0.16), inset 0 0 24px rgba(255,255,255,0.04);
}

.hero {
  display:flex;
  justify-content:center;
  align-items:flex-end;
  min-height:75vh;
  text-align:center;
}

.panel {
  width:100%;
  max-width:720px;
  padding:24px;
  border-radius:24px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(212,175,55,0.25);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.title {
  font-family:'Cinzel', serif;
  font-size:clamp(2.8rem,10vw,4.5rem);
  font-weight:900;
  margin:0;
  background:linear-gradient(90deg,#fff1a8,#d4af37,#fff1a8);
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
}

.megaverse {
  display:block;
  font-size:clamp(3rem,11vw,5rem);
}

.red-line {
  margin:16px auto;
  width:120px;
  height:4px;
  border-radius:999px;
  background:linear-gradient(90deg,#8b0000,#ff2d2d,#8b0000);
  box-shadow:0 0 14px rgba(255,0,0,0.7);
}

.tagline {
  font-size:1.2rem;
  margin-top:10px;
  line-height:1.6;
}

.tagline span {
  display:inline-block;
  margin:0 6px;
  font-weight:700;
}

.gold { color:#d4af37; }
.red { color:#ff3b3b; }

.cta {
  margin-top:20px;
  display:inline-block;
  padding:14px 26px;
  border-radius:30px;
  font-weight:800;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(135deg,#8b0000,#dc2626);
  box-shadow:0 12px 30px rgba(220,38,38,0.35);
}

.carousel {
  margin-top:60px;
  overflow:hidden;
}

.track {
  display:flex;
  gap:20px;
  width:max-content;
  animation:scroll 28s linear infinite;
}

.card {
  width:300px;
  min-width:300px;
  height:380px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.12);
}

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-50%); }
}
</style>
</head>

<body>

<img src="{% static 'img/city_skyline.jpg' %}" class="city-bg" alt="MajicMall Megaverse city skyline">

<div class="overlay"></div>
<div class="stars" id="stars"></div>
<div class="spotlight left"></div>
<div class="spotlight right"></div>

<div class="wrapper">

  <div class="billboard">
    ⭐ PREMIUM BILLBOARD AD SPACE — YOUR BRAND HERE ⭐
  </div>

  <section class="hero">
    <div class="panel">
      <h1 class="title">
        MajicMall
        <span class="megaverse">Megaverse</span>
      </h1>

      <div class="red-line"></div>

      <div class="tagline">
        <span class="gold">Shop.</span>
        <span>Work.</span>
        <span class="red">Play.</span>
        <span>Imagine.</span>
        <span class="gold">Create.</span>
      </div>

     <a href="{% url 'mall-entrance' %}" class="cta">
     Enter MajicMall Megaverse
     </a>
    </div>
  </section>

  <div class="carousel">
    <div class="track">
      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>

      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}" alt="MajicMall Megaverse carousel image"></div>
    </div>
  </div>

</div>

<script>
  const starContainer = document.getElementById("stars");

  if (starContainer) {
    for (let i = 0; i < 48; i++) {
      const star = document.createElement("div");
      star.classList.add("star");
      star.style.top = Math.random() * 42 + "%";
      star.style.left = Math.random() * 100 + "%";
      star.style.animationDelay = (Math.random() * 3) + "s";
      star.style.animationDuration = (2 + Math.random() * 3) + "s";
      starContainer.appendChild(star);
    }
  }
</script>

</body>
</html>
