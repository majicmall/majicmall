{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:'Montserrat', sans-serif;
  color:#fff;
}

.scene {
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

/* WHITE MOVING SPOTLIGHTS */
.spotlight {
  position:absolute;
  width:320px;
  height:900px;
  background:radial-gradient(circle, rgba(255,255,255,0.45), transparent 65%);
  filter:blur(90px);
  opacity:0.4;
  animation:moveLight 8s ease-in-out infinite alternate;
}

.spotlight.left { left:-120px; }
.spotlight.right { right:-120px; animation-delay:2s; }

@keyframes moveLight {
  0% { transform:translateY(-40%) rotate(12deg); }
  100% { transform:translateY(40%) rotate(-12deg); }
}

/* BACKGROUND */
.bg-gradient {
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(255,215,0,0.18), transparent 40%),
    linear-gradient(to bottom, #000 20%, #111 60%, #000);
  z-index:1;
}

/* CONTENT */
.content {
  position:relative;
  z-index:3;
  max-width:650px;
  padding:20px;
}

/* TITLE */
.title {
  font-family:'Cinzel', serif;
  font-size:clamp(2.8rem,10vw,4.5rem);
  font-weight:900;
  line-height:1;

  background:linear-gradient(90deg,#fff1a8,#d4af37,#fff1a8);
  background-clip:text;
  -webkit-background-clip:text;

  color:transparent;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 25px rgba(255,215,0,0.3),
    0 10px 40px rgba(0,0,0,0.9);
}

.megaverse {
  display:block;
  font-size:clamp(3rem,11vw,5rem);
  margin-top:6px;
}

/* RED ACCENT */
.red-accent {
  margin:20px auto 0;
  width:120px;
  height:4px;
  border-radius:999px;
  background:linear-gradient(90deg,#8b0000,#ff2d2d,#8b0000);
  box-shadow:0 0 14px rgba(255,0,0,0.7);
  animation:glowRed 2s ease-in-out infinite alternate;
}

@keyframes glowRed {
  from { opacity:0.6; }
  to { opacity:1; }
}

/* TEXT */
.subtitle {
  margin-top:22px;
  font-size:clamp(1rem,4vw,1.3rem);
  color:#eee;
  font-weight:600;
  line-height:1.6;
}

/* CTA BUTTON */
.cta {
  margin-top:30px;
  display:inline-block;
  padding:18px 30px;
  border-radius:30px;
  font-weight:900;
  font-size:1.15rem;
  text-decoration:none;
  color:#fff;

  background:linear-gradient(135deg,#8b0000,#dc2626);
  box-shadow:
    0 12px 35px rgba(220,38,38,0.45),
    0 0 20px rgba(255,0,0,0.6);

  transition:all 0.25s ease;
}

.cta:hover {
  transform:translateY(-3px);
  box-shadow:
    0 18px 45px rgba(220,38,38,0.6),
    0 0 30px rgba(255,0,0,0.8);
}
</style>
</head>

<body>

<div class="scene">

  <div class="bg-gradient"></div>

  <div class="spotlight left"></div>
  <div class="spotlight right"></div>

  <div class="content">

    <h1 class="title">
      MajicMall
      <span class="megaverse">Megaverse</span>
    </h1>

    <div class="red-accent"></div>

    <p class="subtitle">
      The Mega Shopping Experience<br><br>

      <strong style="color:#d4af37;">Shop.</strong>
      <strong> Work.</strong>
      <strong style="color:#dc2626;"> Play.</strong>
      <strong> Imagine.</strong>
      <strong style="color:#d4af37;"> Create.</strong><br><br>

      A world of discovery, entertainment, opportunity, and unforgettable experiences — all in one place.
    </p>

    <a href="{% url 'mall-entrance' %}" class="cta">
      Enter MajicMall Megaverse
    </a>

  </div>

</div>

</body>
</html>
