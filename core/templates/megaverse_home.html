{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  font-family:'Montserrat', sans-serif;
  color:#fff;
  overflow-x:hidden;
}

.city-bg {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  z-index:0;
  filter:brightness(0.60) contrast(1.12) saturate(1.12);
  transform:scale(0.98);
}

.overlay {
  position:fixed;
  inset:0;
  z-index:1;
  background:
    radial-gradient(circle at center top, rgba(255,215,120,0.08), transparent 35%),
    linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.62) 72%, #000 100%);
}

.stars { position:fixed; inset:0; z-index:2; pointer-events:none; }

.star {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 8px rgba(255,255,255,0.8);
  animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%,100% { opacity:.18; transform:scale(.8); }
  50% { opacity:1; transform:scale(1.55); }
}

.spotlight {
  position:fixed;
  top:-20%;
  width:40vw;
  height:140vh;
  z-index:2;
  opacity:.52;
  filter:blur(18px);
  mix-blend-mode:screen;
  pointer-events:none;
}

.spotlight.left {
  left:-15vw;
  background:linear-gradient(to bottom, rgba(255,255,255,0.85), transparent);
  animation:swayLeft 6s ease-in-out infinite alternate;
}

.spotlight.right {
  right:-15vw;
  background:linear-gradient(to bottom, rgba(255,255,255,0.85), transparent);
  animation:swayRight 6s ease-in-out infinite alternate;
}

@keyframes swayLeft {
  from { transform:rotate(-20deg) translateX(-40px); }
  to { transform:rotate(-5deg) translateX(140px); }
}

@keyframes swayRight {
  from { transform:rotate(20deg) translateX(40px); }
  to { transform:rotate(5deg) translateX(-140px); }
}

.wrapper {
  position:relative;
  z-index:3;
  max-width:1200px;
  margin:0 auto;
  padding:42px 20px 80px;
}

.billboard-wrap {
  width:100%;
  display:flex;
  justify-content:center;
  margin:0 auto 22px;
}

.billboard {
  width:min(92vw,780px);
  padding:14px 20px;
  border-radius:10px;
  border:2px solid rgba(212,175,55,0.68);
  text-align:center;
  color:#fff1a8;
}

/* 🔥 LOWERED MORE */
.hero {
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:78vh;
  padding-top:36vh;
  text-align:center;
}

.panel {
  width:100%;
  max-width:720px;
  padding:24px;
  border-radius:24px;
  background:rgba(0,0,0,0.38);
  backdrop-filter:blur(10px);
  border:1px solid rgba(212,175,55,0.28);
}

/* ✨ SLOW INTERNAL GOLD LIGHT */
.title {
  font-family:'Cinzel', serif;
  font-size:clamp(2.8rem,9.5vw,4.5rem);
  font-weight:900;
  margin:0;
  line-height:.95;

  background:linear-gradient(
    120deg,
    #fff1a8 0%,
    #d4af37 25%,
    #fff1a8 50%,
    #d4af37 75%,
    #fff1a8 100%
  );

  background-size:200% 200%;
  animation:goldGlow 7s ease-in-out infinite;

  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
}

@keyframes goldGlow {
  0%   { background-position:0% 50%; }
  50%  { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

.megaverse {
  display:block;
  font-size:clamp(3rem,10.5vw,5rem);
}

.red-line {
  margin:16px auto;
  width:120px;
  height:4px;
  border-radius:999px;
  background:linear-gradient(90deg,#8b0000,#ff2d2d,#8b0000);
}

.tagline {
  margin-top:10px;
  white-space:nowrap;
}

.gold { color:#d4af37; }
.red { color:#ff3b3b; }

.cta {
  margin-top:22px;
  display:inline-block;
  padding:14px 26px;
  border-radius:30px;
  color:#fff;
  background:linear-gradient(135deg,#8b0000,#dc2626);
}
</style>
</head>

<body>

<img src="{% static 'img/city_skyline.jpg' %}" class="city-bg">

<div class="overlay"></div>
<div class="stars" id="stars"></div>

<div class="spotlight left"></div>
<div class="spotlight right"></div>

<div class="wrapper">

<section class="hero">
  <div class="panel">
    <h1 class="title">
      MajicMall
      <span class="megaverse">Megaverse</span>
    </h1>

    <div class="red-line"></div>

    <div class="tagline">
      <span class="gold">Shop.</span>
      <span>Work.</span>
      <span class="red">Play.</span>
      <span>Imagine.</span>
      <span class="gold">Create.</span>
    </div>

    <a href="{% url 'mall-entrance' %}" class="cta">
      Enter MajicMall Megaverse
    </a>
  </div>
</section>

</div>

<script>
const starContainer = document.getElementById("stars");
for (let i = 0; i < 48; i++) {
  const star = document.createElement("div");
  star.classList.add("star");
  star.style.top = Math.random()*42 + "%";
  star.style.left = Math.random()*100 + "%";
  starContainer.appendChild(star);
}
</script>

</body>
</html>
