{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  font-family:'Montserrat', sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* 🌆 BACKGROUND */
.city-bg {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  z-index:0;
  filter:brightness(0.55) contrast(1.1);
}

/* SKY OVERLAY */
.overlay {
  position:fixed;
  inset:0;
  z-index:1;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 70%, #000 100%);
}

/* 🎥 CROSSING SPOTLIGHTS */
.spotlight {
  position:fixed;
  top:-20%;
  width:40vw;
  height:140vh;
  z-index:2;
  opacity:0.6;
  filter:blur(18px);
  mix-blend-mode:screen;
  pointer-events:none;
}

.spotlight.left {
  left:-15vw;
  background:linear-gradient(to bottom, rgba(255,255,255,0.9), transparent);
  animation:swayLeft 6s ease-in-out infinite alternate;
}

.spotlight.right {
  right:-15vw;
  background:linear-gradient(to bottom, rgba(255,255,255,0.9), transparent);
  animation:swayRight 6s ease-in-out infinite alternate;
}

@keyframes swayLeft {
  from { transform:rotate(-20deg) translateX(-40px); }
  to { transform:rotate(-5deg) translateX(140px); }
}

@keyframes swayRight {
  from { transform:rotate(20deg) translateX(40px); }
  to { transform:rotate(5deg) translateX(-140px); }
}

/* CONTENT */
.wrapper {
  position:relative;
  z-index:3;
  max-width:1200px;
  margin:0 auto;
  padding:40px 20px 80px;
}

/* 🪧 BILLBOARD */
.billboard {
  width:100%;
  max-width:900px;
  margin:0 auto 30px;
  padding:16px;
  border-radius:14px;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.2);
  text-align:center;
  font-weight:600;
  letter-spacing:1px;
  font-size:14px;
}

/* HERO */
.hero {
  display:flex;
  justify-content:center;
  align-items:flex-end;
  min-height:75vh;
  text-align:center;
}

/* GLASS PANEL */
.panel {
  width:100%;
  max-width:720px;
  padding:24px;
  border-radius:24px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
  border:1px solid rgba(212,175,55,0.25);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* TITLE */
.title {
  font-family:'Cinzel', serif;
  font-size:clamp(2.8rem,10vw,4.5rem);
  font-weight:900;
  margin:0;

  background:linear-gradient(90deg,#fff1a8,#d4af37,#fff1a8);

  background-clip:text;              /* 👈 ADD THIS */
  -webkit-background-clip:text;

  color:transparent;                 /* 👈 ADD THIS */
  -webkit-text-fill-color:transparent;
}

.megaverse {
  display:block;
  font-size:clamp(3rem,11vw,5rem);
}

/* RED LINE */
.red-line {
  margin:16px auto;
  width:120px;
  height:4px;
  background:linear-gradient(90deg,#8b0000,#ff2d2d,#8b0000);
}

/* TAGLINE */
.tagline {
  font-size:1.2rem;
  margin-top:10px;
  line-height:1.6;
}

.tagline span {
  display:inline-block;
  margin:0 6px;
  font-weight:700;
}

.gold { color:#d4af37; }
.red { color:#ff3b3b; }

/* CTA */
.cta {
  margin-top:20px;
  display:inline-block;
  padding:14px 26px;
  border-radius:30px;
  font-weight:800;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(135deg,#8b0000,#dc2626);
}

/* CAROUSEL */
.carousel {
  margin-top:60px;
  overflow:hidden;
}

.track {
  display:flex;
  gap:20px;
  animation:scroll 28s linear infinite;
}

.card {
  width:300px;
  height:380px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-50%); }
}
</style>
</head>

<body>

<img src="{% static 'img/grand_entrance_city_view.png' %}" class="city-bg">

<div class="overlay"></div>

<div class="spotlight left"></div>
<div class="spotlight right"></div>

<div class="wrapper">

  <!-- BILLBOARD -->
  <div class="billboard">
    ⭐ PREMIUM AD SPACE — YOUR BRAND HERE ⭐
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="panel">

      <h1 class="title">
        MajicMall
        <span class="megaverse">Megaverse</span>
      </h1>

      <div class="red-line"></div>

      <div class="tagline">
        <span class="gold">Shop.</span>
        <span>Work.</span>
        <span class="red">Play.</span>
        <span>Imagine.</span>
        <span class="gold">Create.</span>
      </div>

      <a href="{% url 'mall-entrance' %}" class="cta">
        Enter MajicMall Megaverse
      </a>

    </div>
  </section>

  <!-- CAROUSEL -->
  <div class="carousel">
    <div class="track">

      <div class="card"><img src="{% static 'img/majic_directory.png' %}"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}"></div>
      <div class="card"><img src="{% static 'img/majic_directory.png' %}"></div>

    </div>
  </div>

</div>

</body>
</html>
