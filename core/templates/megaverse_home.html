{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  font-family:'Montserrat', sans-serif;
  color:#fff;
  overflow-x:hidden;
}

.city-bg {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  z-index:0;

  filter:brightness(0.65) contrast(1.15) saturate(1.2);

  transform:scale(1.02);
  animation:cityDrift 30s linear infinite alternate;
}

@keyframes cityDrift {
  from {
    transform:scale(1.02) translateY(0);
  }
  to {
    transform:scale(1.06) translateY(-2%);
  }
}

.overlay {
  position:fixed;
  inset:0;
  z-index:1;
  background:linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.7));
}

.wrapper {
  position:relative;
  z-index:3;
  max-width:1200px;
  margin:0 auto;
  padding:40px 20px 80px;
}

/* HERO */
.hero {
  display:flex;
  justify-content:center;
  align-items:flex-end;
  min-height:75vh;
  text-align:center;
}

.panel {
  width:100%;
  max-width:720px;
  padding:24px;
  border-radius:24px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
  border:1px solid rgba(212,175,55,0.25);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.title {
  font-family:'Cinzel', serif;
  font-size:clamp(3rem,10vw,4.5rem);
  font-weight:900;

  background:linear-gradient(90deg,#fff1a8,#d4af37,#fff1a8);
  background-size:200% auto;

  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;

  animation:goldShimmer 6s linear infinite;

  text-shadow:
    0 0 10px rgba(212,175,55,0.4),
    0 0 20px rgba(212,175,55,0.25);
}

@keyframes goldShimmer {
  0% { background-position:0% center; }
  100% { background-position:200% center; }
}


.megaverse {
  display:block;
  font-size:clamp(3.2rem,11vw,5rem);
}

.cta {
  margin-top:20px;
  display:inline-block;
  padding:14px 26px;
  border-radius:30px;
  font-weight:800;
  text-decoration:none;
  color:#fff;

  background:linear-gradient(135deg,#8b0000,#dc2626);

  box-shadow:0 12px 30px rgba(220,38,38,0.35);

  transition:all .3s ease;

  animation:ctaPulse 2.8s ease-in-out infinite;
}

.cta:hover {
  transform:scale(1.05);
}

@keyframes ctaPulse {
  0%,100% {
    box-shadow:0 12px 30px rgba(220,38,38,0.35);
  }
  50% {
    box-shadow:0 16px 40px rgba(220,38,38,0.55);
  }
}

.cta:hover {
  transform:scale(1.05);
}

@keyframes ctaPulse {
  0%,100% {
    box-shadow:0 12px 30px rgba(220,38,38,0.35);
  }
  50% {
    box-shadow:0 16px 40px rgba(220,38,38,0.55);
  }
}

/* 🔥 EXPERIENCE SECTION */
.experiences {
  margin-top:70px;
}

.experience-title {
  font-family:'Cinzel', serif;
  font-size:clamp(1.8rem,6vw,2.6rem);
  margin-bottom:20px;
  color:#fff1a8;
  text-align:center;
}

/* SMOOTH SCROLL STRIP */
.experience-track {
  display:flex;
  gap:20px;
  overflow-x:auto;
  padding:20px 10px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}

/* hide scrollbar */
.experience-track::-webkit-scrollbar {
  display:none;
}
.experience-track {
  scrollbar-width:none;
}

/* CARDS */
.experience-card {
  position:relative;
  min-width:260px;
  height:320px;
  border-radius:20px;
  overflow:hidden;
  text-decoration:none;
  border:1px solid rgba(255,255,255,0.15);
  transition:all .35s ease;
  scroll-snap-align:center;
}

.experience-card:hover {
  transform:translateY(-10px) scale(1.04);
  box-shadow:0 20px 40px rgba(0,0,0,0.7);
}

.experience-card img {
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.85);
  transition:transform .6s ease;
}

.experience-card:hover img {
  transform:scale(1.08);
}

/* LABEL */
.label {
  position:absolute;
  bottom:0;
  width:100%;
  padding:14px;
  background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
  font-weight:700;
  color:#fff;
  font-size:1rem;
  letter-spacing:.5px;
}
</style>
</head>

<body>

<img src="{% static 'img/city_skyline.jpg' %}" class="city-bg">

<div class="overlay"></div>

<div class="wrapper">

<section class="hero">
  <div class="panel">
    <h1 class="title">
      MajicMall
      <span class="megaverse">Megaverse</span>
    </h1>

    <a href="{% url 'mall-entrance' %}" class="cta">
      Enter MajicMall Megaverse
    </a>
  </div>
</section>

<div class="experiences">

  <h2 class="experience-title">Explore the MajicMall Megaverse</h2>

  <div class="experience-track">

    <a href="/directory/" class="experience-card">
      <img src="{% static 'img/majic_directory.png' %}">
      <div class="label">Shop the Marketplace</div>
    </a>

    <a href="/tv/" class="experience-card">
      <img src="{% static 'img/majictheater_lobby.jpg' %}">
      <div class="label">Watch MajicMall TV</div>
    </a>

    <a href="/theater/" class="experience-card">
      <img src="{% static 'img/majic_mall_theater_front_1920.jpg' %}">
      <div class="label">Enter the Theater</div>
    </a>

    <a href="#" class="experience-card">
      <img src="{% static 'img/grand_entrance_city_view.png' %}">
      <div class="label">Live Events</div>
    </a>

    <a href="#" class="experience-card">
      <img src="{% static 'img/mall_background.jpg' %}">
      <div class="label">Become a Merchant</div>
    </a>

  </div>

</div>

</div>

</body>
</html>
