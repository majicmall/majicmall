{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MajicMall Megaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  font-family:'Montserrat', sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* 🌆 CITY */
.city-bg {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  z-index:0;
  filter:brightness(0.65) contrast(1.15) saturate(1.2);
}

/* 🌑 OVERLAY */
.overlay {
  position:fixed;
  inset:0;
  z-index:1;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
}

/* ✨ SPOTLIGHTS (RESTORED) */
.spotlight {
  position:fixed;
  top:-20%;
  width:40vw;
  height:140vh;
  z-index:2;
  opacity:0.55;
  filter:blur(18px);
  mix-blend-mode:screen;
  pointer-events:none;
}

.spotlight.left {
  left:-15vw;
  background:linear-gradient(to bottom, rgba(255,255,255,0.85), transparent);
  animation:swayLeft 6s ease-in-out infinite alternate;
}

.spotlight.right {
  right:-15vw;
  background:linear-gradient(to bottom, rgba(255,255,255,0.85), transparent);
  animation:swayRight 6s ease-in-out infinite alternate;
}

@keyframes swayLeft {
  from { transform:rotate(-20deg) translateX(-40px); }
  to { transform:rotate(-5deg) translateX(140px); }
}

@keyframes swayRight {
  from { transform:rotate(20deg) translateX(40px); }
  to { transform:rotate(5deg) translateX(-140px); }
}

/* 🧠 WRAPPER */
.wrapper {
  position:relative;
  z-index:3;
  max-width:1200px;
  margin:0 auto;
  padding:60px 20px 80px;
}

/* 📣 BILLBOARD (RESTORED) */
.billboard {
  width:100%;
  max-width:900px;
  margin:0 auto 30px;
  padding:16px;
  border-radius:16px;
  background:linear-gradient(135deg, rgba(0,0,0,0.6), rgba(40,20,20,0.4));
  border:1px solid rgba(212,175,55,0.3);
  text-align:center;
  font-weight:800;
  color:#fff1a8;
  box-shadow:0 0 25px rgba(212,175,55,0.15);
}

/* HERO */
.hero {
  display:flex;
  justify-content:center;
  align-items:flex-end;
  min-height:85vh; /* LOWERED VIEW */
  text-align:center;
}

.panel {
  width:100%;
  max-width:720px;
  padding:24px;
  border-radius:24px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
  border:1px solid rgba(212,175,55,0.25);
}

/* TITLE */
.title {
  font-family:'Cinzel', serif;
  font-size:clamp(3rem,10vw,4.5rem);
  font-weight:900;

  background:linear-gradient(90deg,#fff1a8,#d4af37,#fff1a8);
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
}

.megaverse {
  display:block;
  font-size:clamp(3.2rem,11vw,5rem);
}

/* CTA */
.cta {
  margin-top:20px;
  display:inline-block;
  padding:14px 26px;
  border-radius:30px;
  font-weight:800;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(135deg,#8b0000,#dc2626);
}

/* 🔥 EXPERIENCES */
.experiences {
  margin-top:60px;
}

.experience-title {
  font-family:'Cinzel', serif;
  font-size:clamp(1.8rem,6vw,2.6rem);
  margin-bottom:20px;
  color:#fff1a8;
  text-align:center;
}

.experience-track {
  display:flex;
  gap:20px;
  overflow-x:auto;
  padding:20px;
  scroll-snap-type:x mandatory;
}

.experience-track::-webkit-scrollbar { display:none; }

.experience-card {
  position:relative;
  min-width:260px;
  height:320px;
  border-radius:20px;
  overflow:hidden;
  text-decoration:none;
  border:1px solid rgba(255,255,255,0.15);
  transition:.3s;
  scroll-snap-align:center;
}

.experience-card:hover {
  transform:translateY(-10px) scale(1.04);
}

.experience-card img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.label {
  position:absolute;
  bottom:0;
  width:100%;
  padding:14px;
  background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
  font-weight:700;
}
</style>
</head>

<body>

<img src="{% static 'img/city_skyline.jpg' %}" class="city-bg">

<div class="overlay"></div>

<!-- ✨ SPOTLIGHTS BACK -->
<div class="spotlight left"></div>
<div class="spotlight right"></div>

<div class="wrapper">

<div class="billboard">
  ⭐ PREMIUM BILLBOARD AD SPACE — YOUR BRAND HERE ⭐
</div>

<section class="hero">
  <div class="panel">
    <h1 class="title">
      MajicMall
      <span class="megaverse">Megaverse</span>
    </h1>

    <a href="{% url 'mall-entrance' %}" class="cta">
      Enter MajicMall Megaverse
    </a>
  </div>
</section>

<div class="experiences">

  <h2 class="experience-title">Explore the MajicMall Megaverse</h2>

  <div class="experience-track">

    <a href="/directory/" class="experience-card">
      <img src="{% static 'img/majic_directory.png' %}">
      <div class="label">Shop the Marketplace</div>
    </a>

    <a href="/tv/" class="experience-card">
      <img src="{% static 'img/majictheater_lobby.jpg' %}">
      <div class="label">Watch MajicMall TV</div>
    </a>

    <a href="/theater/" class="experience-card">
      <img src="{% static 'img/majic_mall_theater_front_1920.jpg' %}">
      <div class="label">Enter the Theater</div>
    </a>

  </div>

</div>

</div>

</body>
</html>
