<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Your Cart | Majic Mall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <main class="max-w-4xl mx-auto px-6 py-10">
    <h1 class="text-3xl font-bold text-yellow-400 mb-6">Your Cart</h1>

    {% if cart %}
      <div class="space-y-4">
        {% for key, item in cart.items %}
          <div class="bg-gray-900 rounded-2xl p-5 border border-gray-800">
            <div class="text-xl font-semibold">{{ item.name }}</div>
            <div class="text-gray-400 mt-1">Quantity: {{ item.quantity }}</div>
            <div class="text-yellow-400 font-bold mt-2">${{ item.price }}</div>
          </div>
        {% endfor %}
      </div>

      <div class="mt-8 flex gap-3 flex-wrap">
        {% if last_store_slug %}
          <a href="{% url 'storefront' last_store_slug %}"
             class="px-5 py-3 bg-gray-800 text-yellow-400 rounded-xl hover:bg-gray-700">
            Continue This Store
          </a>
        {% endif %}

        <a href="{% url 'mall-directory' %}"
           class="px-5 py-3 bg-purple-700 text-white rounded-xl hover:bg-purple-800">
          Browse More Stores
        </a>

        <a href="{% url 'public-checkout' %}"
   class="px-5 py-3 bg-yellow-400 text-black rounded-xl font-semibold hover:opacity-90">
  Proceed to Checkout
</a>
      </div>
    {% else %}
      <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800 text-gray-300">
        Your cart is empty.
      </div>

      <div class="mt-8 flex gap-3 flex-wrap">
        <a href="{% url 'mall-directory' %}"
           class="px-5 py-3 bg-purple-700 text-white rounded-xl hover:bg-purple-800">
          Browse More Stores
        </a>
      </div>
    {% endif %}
  </main>
</body>
</html>
