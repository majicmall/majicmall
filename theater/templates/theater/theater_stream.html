{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ movie.title }} | MajicMall Megaverse Cinemas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  color:white;
  font-family:Georgia, serif;
  overflow:hidden;
}

.cinema-experience {
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
}

.theater-bg {
  position:absolute;
  inset:0;
  z-index:1;
  background-image:
    linear-gradient(to bottom, rgba(0,0,0,.02), rgba(0,0,0,.24)),
    url("/static/img/majic_screen_theater.jpg");
  background-size:cover;
  background-position:center center;
  background-repeat:no-repeat;
  animation:theaterPush 11s ease-in-out forwards;
}

.dim-layer {
  position:absolute;
  inset:0;
  z-index:2;
  background:rgba(0,0,0,0);
  animation:lightsDown 11s ease-in-out forwards;
  pointer-events:none;
}

.aisle-glow {
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
  background:
    radial-gradient(ellipse at center bottom, rgba(255,215,0,.30), transparent 46%),
    linear-gradient(to bottom, transparent 0%, rgba(255,215,0,.10) 62%, rgba(255,215,0,.28) 100%);
  opacity:1;
  animation:aisleFade 8.5s ease forwards;
}

.projector-beam {
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
  background:
    radial-gradient(ellipse at center 20%, rgba(255,255,255,.16), transparent 50%);
  opacity:0;
  animation:projectorOn 5s ease forwards;
}

.projector-dust {
  position:absolute;
  inset:0;
  z-index:4;
  pointer-events:none;
  opacity:0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.24) 0 1px, transparent 2px),
    radial-gradient(circle, rgba(255,215,160,.18) 0 1px, transparent 2px);
  background-size:90px 90px, 140px 140px;
  background-position:0 0, 35px 60px;
  animation:dustFloat 12s linear infinite, dustAppear 6s ease forwards;
}

.majic-intro {
  position:absolute;
  left:50%;
  top:43%;
  width:42vw;
  max-width:900px;
  aspect-ratio:16 / 9;
  transform:translate(-50%, -50%) scale(.96);
  z-index:6;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  pointer-events:none;
  opacity:0;
  background:
    radial-gradient(circle at center, rgba(255,215,0,.14), transparent 52%),
    linear-gradient(to bottom, rgba(0,0,0,.24), rgba(0,0,0,.38));
  border-radius:10px;
  animation:majicIntro 6.2s ease forwards;
}

.majic-logo {
  color:#ffd700;
  font-size:clamp(.8rem,1.65vw,1.55rem);
  letter-spacing:.14em;
  text-transform:uppercase;
  text-shadow:
    0 0 12px rgba(255,215,0,.75),
    0 0 28px rgba(255,215,0,.35);
}

.majic-screen-name {
  margin-top:18px;
  color:white;
  font-size:clamp(1.35rem,3.5vw,3.4rem);
  letter-spacing:.12em;
  text-transform:uppercase;
  text-shadow:
    0 0 18px rgba(255,255,255,.55),
    0 0 34px rgba(255,215,0,.45);
}

.majic-tagline {
  margin-top:15px;
  color:#f8e7a0;
  font-size:clamp(.75rem,1.6vw,1.3rem);
  letter-spacing:.24em;
  text-transform:uppercase;
  text-shadow:0 0 18px rgba(255,215,0,.45);
}

.screen-player {
  position:absolute;
  left:50%;
  top:43%;
  z-index:5;
  width:42vw;
  max-width:900px;
  aspect-ratio:16 / 9;
  transform:translate(-50%, -50%) scale(.30);
  opacity:0;
  background:#000;
  border-radius:10px;
  overflow:hidden;
  box-shadow:
    0 0 28px rgba(255,255,255,.18),
    0 0 70px rgba(255,215,0,.22),
    0 40px 100px rgba(0,0,0,.95);
  animation:screenMoveForward 11s ease-in-out forwards;
}

.screen-player::before {
  content:"";
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(255,255,255,.72), transparent 45%),
    linear-gradient(to bottom, rgba(255,255,255,.18), transparent);
  opacity:0;
  animation:screenAwaken 11s ease-in-out forwards;
}

.screen-player::after {
  content:"";
  position:absolute;
  inset:0;
  z-index:4;
  pointer-events:none;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,.045) 0px,
      rgba(255,255,255,.045) 1px,
      transparent 2px,
      transparent 4px
    );
  opacity:0;
  animation:filmFlicker 2.6s ease-in-out 8.4s forwards;
}

.screen-player video {
  width:100%;
  height:100%;
  object-fit:cover;
  background:#000;
}

.ad-label {
  position:absolute;
  left:16px;
  top:14px;
  z-index:9;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.65);
  border:1px solid rgba(255,215,0,.35);
  color:#ffd700;
  font-size:.76rem;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  opacity:0;
}

.cinema-experience.ready .ad-label {
  opacity:1;
}

.cinema-experience.feature-started .ad-label {
  display:none;
}

.controls {
  position:absolute;
  left:50%;
  bottom:22px;
  z-index:8;
  transform:translateX(-50%);
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
  opacity:0;
  animation:controlsIn 11s ease forwards;
}

.btn {
  display:inline-block;
  padding:13px 20px;
  border-radius:999px;
  text-decoration:none;
  font-weight:900;
  transition:.25s ease;
}

.btn:hover {
  transform:translateY(-2px);
}

.btn-gold {
  background:linear-gradient(135deg,#fff2a8,#d4af37);
  color:#111;
}

.btn-dark {
  background:rgba(0,0,0,.68);
  color:#fff;
  border:1px solid rgba(255,255,255,.25);
}

.skip-intro {
  position:absolute;
  top:18px;
  right:18px;
  z-index:9;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.28);
  background:rgba(0,0,0,.52);
  color:white;
  font-weight:900;
  cursor:pointer;
}

@keyframes theaterPush {
  0% { transform:scale(1); filter:brightness(1); }
  45% { transform:scale(1.04); filter:brightness(.86); }
  75% { transform:scale(1.10); filter:brightness(.58); }
  100% { transform:scale(1.15); filter:brightness(.36); }
}

@keyframes lightsDown {
  0% { background:rgba(0,0,0,0); }
  50% { background:rgba(0,0,0,.18); }
  100% { background:rgba(0,0,0,.66); }
}

@keyframes aisleFade {
  0% { opacity:1; }
  65% { opacity:.55; }
  100% { opacity:0; }
}

@keyframes projectorOn {
  0%, 24% { opacity:0; }
  100% { opacity:.72; }
}

@keyframes dustAppear {
  0%, 34% { opacity:0; }
  100% { opacity:.23; }
}

@keyframes dustFloat {
  from { background-position:0 0, 35px 60px; }
  to { background-position:160px -120px, -80px 180px; }
}

@keyframes majicIntro {
  0%, 8% {
    opacity:0;
    transform:translate(-50%, -50%) scale(.92);
  }

  18%, 68% {
    opacity:1;
    transform:translate(-50%, -50%) scale(1);
  }

  100% {
    opacity:0;
    transform:translate(-50%, -50%) scale(1.06);
  }
}

@keyframes screenMoveForward {
  0%, 30% {
    opacity:0;
    top:43%;
    width:42vw;
    transform:translate(-50%, -50%) scale(.30);
  }

  52% {
    opacity:.30;
    top:45%;
    width:52vw;
    transform:translate(-50%, -50%) scale(.48);
  }

  78% {
    opacity:.86;
    top:48%;
    width:72vw;
    transform:translate(-50%, -50%) scale(.78);
  }

  100% {
    opacity:1;
    top:50%;
    width:min(1120px,94vw);
    transform:translate(-50%, -50%) scale(1);
  }
}

@keyframes screenAwaken {
  0%, 55% {
    opacity:0;
  }

  65% {
    opacity:.35;
  }

  72% {
    opacity:.08;
  }

  78% {
    opacity:.52;
  }

  88% {
    opacity:.12;
  }

  100% {
    opacity:0;
  }
}

@keyframes filmFlicker {
  0% { opacity:0; }
  22% { opacity:.20; }
  45% { opacity:.04; }
  68% { opacity:.16; }
  100% { opacity:0; }
}

@keyframes controlsIn {
  0%, 82% { opacity:0; }
  100% { opacity:1; }
}

.cinema-experience.ready .theater-bg {
  animation:none;
  transform:scale(1.15);
  filter:brightness(.34);
}

.cinema-experience.ready .dim-layer {
  animation:none;
  background:rgba(0,0,0,.70);
}

.cinema-experience.ready .aisle-glow {
  animation:none;
  opacity:0;
}

.cinema-experience.ready .projector-beam {
  animation:none;
  opacity:.72;
}

.cinema-experience.ready .projector-dust {
  opacity:.18;
}

.cinema-experience.ready .majic-intro {
  animation:none;
  opacity:0;
}

.cinema-experience.ready .screen-player {
  animation:none;
  opacity:1;
  top:50%;
  width:min(1120px,94vw);
  transform:translate(-50%, -50%) scale(1);
}

.cinema-experience.ready .screen-player::before,
.cinema-experience.ready .screen-player::after {
  animation:none;
  opacity:0;
}

.cinema-experience.ready .controls {
  animation:none;
  opacity:1;
}

@media(max-width:720px) {
  .majic-intro,
  .screen-player {
    top:42%;
    width:58vw;
  }

  .cinema-experience.ready .screen-player {
    width:96vw;
  }

  .controls {
    width:94vw;
    bottom:14px;
  }

  .btn {
    width:100%;
    text-align:center;
    box-sizing:border-box;
  }

  .skip-intro {
    top:12px;
    right:12px;
    font-size:.82rem;
  }
}
</style>
</head>

<body>

<main class="cinema-experience" id="cinemaExperience">

  <button class="skip-intro" type="button" onclick="skipIntro()">Skip Intro</button>

  <div class="theater-bg"></div>
  <div class="dim-layer"></div>
  <div class="aisle-glow"></div>
  <div class="projector-beam"></div>
  <div class="projector-dust"></div>

  <div class="majic-intro">
    <div class="majic-logo">MajicMall Megaverse Cinemas</div>

    <div class="majic-screen-name">
      {% if movie.screen %}
        {{ movie.screen.name }}
      {% else %}
        Majic Screen
      {% endif %}
    </div>

    <div class="majic-tagline">
      {{ movie.title }}
    </div>
  </div>

  <section class="screen-player">
  <video id="movieVideo" controls preload="metadata" playsinline>
    <source
      src="https://majicmallvideos-238841125891-us-east-2-an.s3.us-east-2.amazonaws.com/wawlam_trailer.mp4"
      type="video/mp4">
    Your browser does not support video playback.
  </video>
</section>

  <div class="controls">
    <a href="{% url 'box-office' %}" class="btn btn-gold">← Back to Now Showing</a>
    <a href="{% url 'theater-lobby' %}" class="btn btn-dark">Return to Lobby</a>
  </div>

</main>

<script>
const PREROLL_AD_URL = "https://majicmallvideos-238841125891-us-east-2-an.s3.us-east-2.amazonaws.com/wawlam_trailer.mp4";
const FEATURE_MOVIE_URL = "https://majicmallvideos-238841125891-us-east-2-an.s3.us-east-2.amazonaws.com/wawlam_trailer.mp4";

let featureStarted = false;

function playFeature() {
  const cinema = document.getElementById("cinemaExperience");
  const video = document.getElementById("movieVideo");
  const source = document.getElementById("movieSource");

  featureStarted = true;
  cinema.classList.add("feature-started");

  source.src = FEATURE_MOVIE_URL;
  video.load();
  video.play().catch(function () {});
}

function beginMovie() {
  const cinema = document.getElementById("cinemaExperience");
  const video = document.getElementById("movieVideo");
  const source = document.getElementById("movieSource");

  cinema.classList.add("ready");

  source.src = PREROLL_AD_URL;
  video.load();
  video.play().catch(function () {});
}

function skipIntro() {
  beginMovie();
}

document.getElementById("movieVideo").addEventListener("ended", function () {
  if (!featureStarted) {
    playFeature();
  }
});

setTimeout(beginMovie, 11000);
</script>

</body>
</html>
