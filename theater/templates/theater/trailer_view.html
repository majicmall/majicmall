{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>When A Man Loves A Woman | Official Trailer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,.70), rgba(0,0,0,.85)),
        url("{% static 'img/theater_front.png' %}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      text-align: center;
      font-family: Georgia, serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .trailer-container {
      width: 100%;
      max-width: 1100px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,215,0,.38);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 0 44px rgba(255,215,0,.2);
    }

    h1 {
      color: gold;
      font-size: clamp(2rem, 4vw, 3.5rem);
      margin-bottom: 10px;
      text-shadow: 0 0 18px rgba(255,215,0,.5);
    }

    .subtitle {
      color: #ddd;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    video {
      width: 100%;
      border-radius: 20px;
      border: 4px solid gold;
      background: #000;
      box-shadow:
        0 0 20px rgba(255,215,0,.4),
        0 0 40px rgba(255,0,0,.22);
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      transition: .3s ease;
    }

    .btn-gold {
      background: gold;
      color: black;
    }

    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px gold;
    }

    .btn-red {
      background: #c1121f;
      color: white;
    }

    .btn-red:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255,0,0,.5);
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 12px;
      }

      .trailer-container {
        padding: 18px;
        border-radius: 18px;
      }

      video {
        border-width: 2px;
        border-radius: 14px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="trailer-container">

  <h1>🎬 When A Man Loves A Woman</h1>

  <div class="subtitle">
    Official MajicMall Megaverse Trailer Experience
  </div>

  <video controls preload="metadata" playsinline>
    <!-- Production S3 MP4 source -->
    <source
      src="https://majicmallvideos-238841125891-us-east-2-an.s3.us-east-2.amazonaws.com/wawlam_trailer.mp4"
      type="video/mp4">

    <!-- Local development fallback -->
    <source
      src="{% static 'videos/trailers/wawlam_trailer.mp4' %}"
      type="video/mp4">

    Your browser does not support video playback.
  </video>

  <div class="buttons">
    <a href="/theater/" class="btn btn-gold">
      🍿 Enter Theater
    </a>

    <a href="/theater/movies/" class="btn btn-red">
      🎥 Now Showing
    </a>
  </div>

</div>

</body>
</html>
